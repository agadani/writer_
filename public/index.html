W.saveS3 = async () => {
  const config = { provider:'s3', endpoint:document.getElementById('cf-endpoint')?.value||'', bucket:document.getElementById('cf-bucket')?.value||'', region:document.getElementById('cf-region')?.value||'', accessKeyId:document.getElementById('cf-akid')?.value||'', secretAccessKey:document.getElementById('cf-skey')?.value||'', folder:document.getElementById('cf-folder')?.value||'' };
  const name = document.getElementById('cf-name')?.value || 'S3 Bucket';
  const conn = {id:W.uid(),provider:'s3',name,config:JSON.stringify(config),lastSyncAt:null,createdAt:W.now()};
  await W.dbPut('clouds', conn);
  W.clouds.push(conn);
  W.openModal('cloud');
};

W.cloudRemove = async id => {
  if (!confirm('Disconnect this account? Your files on the cloud service are not affected.')) return;
  await W.dbDel('clouds', id);
  W.clouds = W.clouds.filter(c => c.id !== id);
  W.openModal('cloud');
};

W.cloudBackup = async (id, silent) => {
  if (W.isSyncing && !silent) return;
  const conn = W.clouds.find(c => c.id === id);
  if (!conn) { W.isSyncing = false; return; }
  const statusEl = document.getElementById('cloud-status');
  if (statusEl) statusEl.innerHTML = `<div class="status-msg">// uploading to ${W.esc(conn.name)}...</div>`;
  W.updateSyncUI('syncing');
  try {
    const config = await W.ensureFreshToken(conn);
    const manifestData = {
      v:2, syncedAt:W.now(),
      documents:W.docs.map(d=>({id:d.id,title:d.title,content:d.content,folderId:d.folderId,createdAt:d.createdAt,updatedAt:d.updatedAt,wordCountGoal:d.wordCountGoal,charCountGoal:d.charCountGoal})),
      folders:W.folders.map(f=>({id:f.id,name:f.name,createdAt:f.createdAt})),
    };
    if (conn.provider === 'google-drive') {
      // Load gdriveFiles map from local config (shared via manifest on pull)
      if (config.gdriveFiles) manifestData.gdriveFiles = config.gdriveFiles;
      await W.gdrivePush(config, conn, manifestData, statusEl);
    } else if (conn.provider === 'dropbox') {
      const backup = JSON.stringify(manifestData);
      const filename = 'writer-sync.json';
      const path = config.folder ? `${config.folder}/${filename}` : `/${filename}`;
      const r = await fetch('https://content.dropboxapi.com/2/files/upload',{method:'POST',headers:{Authorization:`Bearer ${config.accessToken}`,'Content-Type':'application/octet-stream','Dropbox-API-Arg':JSON.stringify({path,mode:'overwrite',autorename:false,mute:true})},body:backup});
      if (!r.ok) throw new Error(await r.text());
    } else if (conn.provider === 'onedrive') {
      const folder = config.folder || 'Writer Backups';
      const r = await fetch(`https://graph.microsoft.com/v1.0/me/drive/root:/${folder}/writer-sync.json:/content`,{method:'PUT',headers:{Authorization:`Bearer ${config.accessToken}`,'Content-Type':'application/json'},body:JSON.stringify(manifestData)});
      if (!r.ok) throw new Error(await r.text());
    } else if (conn.provider === 's3') {
      const host = config.endpoint || `https://${config.bucket}.s3.${config.region||'us-east-1'}.amazonaws.com`;
      const key = config.folder ? `${config.folder}writer-sync.json` : 'writer-sync.json';
      const r = await fetch(`${host}/${key}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(manifestData)});
      if (!r.ok) throw new Error(await r.text());
    }
    conn.lastSyncAt = W.now();
    await W.dbPut('clouds', conn);
    if (statusEl) statusEl.innerHTML = `<div class="status-msg">// backup complete: ${W.docs.length} docs</div>`;
    W.updateSyncUI('done');
  } catch(err) {
    if (statusEl) statusEl.innerHTML = `<div class="status-msg">// ERROR: ${W.esc(err.message||'unknown')}</div>`;
    W.updateSyncUI('error', err.message);
  }
};

// ── Google Drive manifest sync (single JSON file) ──────────
// ── Google Drive: push manifest + individual editable Docs ──
W.gdrivePush = async (config, conn, manifestData, statusEl) => {
  const token = config.accessToken;
  const boundary = '---314159265358979323846';

  // 1. Find or create the "Writer Backups" folder for editable docs
  let folderId = config.driveFolderId;
  if (!folderId) {
    const sq = encodeURIComponent("name='Writer Backups' and mimeType='application/vnd.google-apps.folder' and trashed=false");
    const sr = await fetch(`https://www.googleapis.com/drive/v3/files?q=${sq}&fields=files(id)`,{headers:{Authorization:'Bearer '+token}});
    if (sr.ok) { const sd = await sr.json(); folderId = sd.files?.[0]?.id; }
    if (!folderId) {
      const cr = await fetch('https://www.googleapis.com/drive/v3/files',{method:'POST',headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({name:'Writer Backups',mimeType:'application/vnd.google-apps.folder'})});
      if (cr.ok) folderId = (await cr.json()).id;
    }
    if (folderId) config.driveFolderId = folderId;
  }

  // 2. Upload/update each doc as an editable Google Doc
  // Use gdriveFiles map from manifest (shared across devices)
  if (!manifestData.gdriveFiles) manifestData.gdriveFiles = {};
  const gf = manifestData.gdriveFiles;
  const changed = W.docs.filter(d => d.updatedAt > (conn.lastSyncAt || 0) || !gf[d.id]);
  if (changed.length) {
    if (statusEl) statusEl.innerHTML = `<div class="status-msg">// pushing ${changed.length} docs to Google Drive...</div>`;
    for (let i = 0; i < changed.length; i += 5) {
      const results = await Promise.allSettled(changed.slice(i, i + 5).map(async doc => {
        const meta = {name: doc.title, mimeType: 'application/vnd.google-apps.document'};
        const existing = gf[doc.id];
        let url, method;
        if (existing) {
          url = `https://www.googleapis.com/upload/drive/v3/files/${existing}?uploadType=multipart`;
          method = 'PATCH';
        } else {
          if (folderId) meta.parents = [folderId];
          url = 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
          method = 'POST';
        }
        const body = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(meta)}\r\n--${boundary}\r\nContent-Type: text/plain\r\n\r\n${doc.content}\r\n--${boundary}--`;
        const r = await fetch(url,{method,headers:{Authorization:'Bearer '+token,'Content-Type':`multipart/related; boundary=${boundary}`},body});
        if (r.ok && !existing) { gf[doc.id] = (await r.json()).id; }
        else if (!r.ok) throw new Error(`Failed to push "${doc.title}": ${await r.text()}`);
      }));
      const failed = results.filter(r => r.status === 'rejected');
      if (failed.length) console.warn('Some docs failed to push:', failed.map(f => f.reason?.message));
    }
  }

  // 3. Upload the manifest (includes gdriveFiles map so other devices know the file IDs)
  const manifest = JSON.stringify(manifestData);
  const syncMeta = {name:'writer-sync.json', mimeType:'application/json'};
  const syncFileId = config.syncFileId;
  let sUrl, sMethod;
  if (syncFileId) { sUrl = `https://www.googleapis.com/upload/drive/v3/files/${syncFileId}?uploadType=multipart`; sMethod = 'PATCH'; }
  else { sUrl = 'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart'; sMethod = 'POST'; if (folderId) syncMeta.parents = [folderId]; }
  const sBody = `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(syncMeta)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${manifest}\r\n--${boundary}--`;
  const sr = await fetch(sUrl, {method:sMethod, headers:{Authorization:'Bearer '+token, 'Content-Type':`multipart/related; boundary=${boundary}`}, body:sBody});
  if (!sr.ok) throw new Error(await sr.text());
  if (!syncFileId) config.syncFileId = (await sr.json()).id;

  // Save gdriveFiles map locally so we don't need to re-download manifest on next push
  config.gdriveFiles = gf;
  conn.config = JSON.stringify(config);
  await W.dbPut('clouds', conn);
};

// ── Google Drive: pull manifest + optionally check Google Docs edits ──
W.gdrivePull = async (config, conn, statusEl) => {
  const token = config.accessToken;

  // 1. Download manifest (this is the source of truth)
  let syncFileId = config.syncFileId;
  let mr;

  // Try cached file ID
  if (syncFileId) {
    mr = await fetch(`https://www.googleapis.com/drive/v3/files/${syncFileId}?alt=media`,{headers:{Authorization:'Bearer '+token}});
    if (!mr.ok) { syncFileId = null; } // stale — search below
  }

  // Search for manifest if no cached ID or cached ID was stale
  if (!syncFileId) {
    const sq = encodeURIComponent("name='writer-sync.json' and trashed=false");
    const sr = await fetch(`https://www.googleapis.com/drive/v3/files?q=${sq}&fields=files(id)&orderBy=modifiedTime desc&pageSize=1`,{headers:{Authorization:'Bearer '+token}});
    if (sr.ok) { const sd = await sr.json(); syncFileId = sd.files?.[0]?.id; }
    if (!syncFileId) return null;
    mr = await fetch(`https://www.googleapis.com/drive/v3/files/${syncFileId}?alt=media`,{headers:{Authorization:'Bearer '+token}});
    if (!mr.ok) return null;
  }

  // Save the current file ID
  if (config.syncFileId !== syncFileId) {
    config.syncFileId = syncFileId;
    conn.config = JSON.stringify(config);
    await W.dbPut('clouds', conn);
  }
  const data = await mr.json();
  if (!data.documents) return null;

  // 2. Check if any Google Docs were edited AFTER the manifest was last synced
  //    (i.e., user opened the doc in Google Docs and made changes)
  const gf = data.gdriveFiles || {};
  const manifestTime = data.syncedAt || 0;
  const docsToCheck = data.documents.filter(d => gf[d.id]);

  if (docsToCheck.length && statusEl) statusEl.innerHTML = `<div class="status-msg">// checking ${docsToCheck.length} Google Docs for edits...</div>`;

  for (let i = 0; i < docsToCheck.length; i += 5) {
    await Promise.all(docsToCheck.slice(i, i + 5).map(async doc => {
      try {
        const gFileId = gf[doc.id];
        const metaR = await fetch(`https://www.googleapis.com/drive/v3/files/${gFileId}?fields=modifiedTime`,{headers:{Authorization:'Bearer '+token}});
        if (!metaR.ok) return;
        const gDocTime = new Date((await metaR.json()).modifiedTime).getTime();
        // Only download if the Google Doc was modified AFTER the manifest was pushed
        // (meaning someone edited it in Google Docs, not just our push touching it)
        if (gDocTime > manifestTime + 60000) { // 60s grace period for push propagation
          const dr = await fetch(`https://www.googleapis.com/drive/v3/files/${gFileId}/export?mimeType=text/plain`,{headers:{Authorization:'Bearer '+token}});
          if (!dr.ok) return;
          const content = (await dr.text()).replace(/^\uFEFF/,'').replace(/\s+$/,'');
          if (content !== doc.content.replace(/\s+$/,'')) {
            doc.content = content;
            doc.updatedAt = gDocTime;
          }
        }
      } catch {}
    }));
  }

  // Save gdriveFiles map locally
  if (gf && Object.keys(gf).length) {
    config.gdriveFiles = gf;
    conn.config = JSON.stringify(config);
    await W.dbPut('clouds', conn);
  }

  return data;
};

// ── Cloud restore (pull) ───────────────────────────────────
W.cloudRestore = async (id, _internal) => {
  if (W.isSyncing && !_internal) return;
  const conn = W.clouds.find(c => c.id === id);
  if (!conn) { W.isSyncing = false; return; }
  const statusEl = document.getElementById('cloud-status');
  if (statusEl) statusEl.innerHTML = `<div class="status-msg">// pulling from ${W.esc(conn.name)}...</div>`;
  try {
    const config = await W.ensureFreshToken(conn);
    if (conn.provider === 'google-drive') {
      await W.restoreFromGDrive(config, conn, statusEl);
    } else if (conn.provider === 'dropbox') {
      await W.restoreFromDropbox(config, statusEl);
    } else {
      throw new Error('Restore not supported for ' + conn.provider);
    }
    conn.lastSyncAt = W.now();
    await W.dbPut('clouds', conn);
    if (statusEl) statusEl.innerHTML = `<div class="status-msg">// pull complete</div>`;
  } catch(err) {
    if (statusEl) statusEl.innerHTML = `<div class="status-msg">// ERROR: ${W.esc(err.message||'unknown')}</div>`;
  }
};

W.resetAndPull = async id => {
  if (!confirm('This will DELETE all local documents and folders, then re-download everything from the cloud. Continue?')) return;
  W.isSyncing = true;
  const statusEl = document.getElementById('cloud-status');
  try {
    if (statusEl) statusEl.innerHTML = `<div class="status-msg">// wiping local data...</div>`;
    for (const d of W.docs) await W.dbDel('documents', d.id);
    for (const f of W.folders) await W.dbDel('folders', f.id);
    W.docs = [];
    W.folders = [];
    W.currentId = null;
    document.getElementById('editor').value = '';
    document.getElementById('editor-highlight').innerHTML = '\n';
    document.getElementById('topbar-title').textContent = '';
    W.renderDocs();
    if (statusEl) statusEl.innerHTML = `<div class="status-msg">// pulling fresh from cloud...</div>`;
    W.isSyncing = false;
    await W.cloudRestore(id);
    if (W.docs.length) W.selectDoc(W.docs[0].id);
    W.renderDocs();
    if (statusEl) statusEl.innerHTML = `<div class="status-msg">// reset complete: ${W.docs.length} docs, ${W.folders.length} folders</div>`;
  } catch(err) {
    if (statusEl) statusEl.innerHTML = `<div class="status-msg">// ERROR: ${W.esc(err.message||'unknown')}</div>`;
  } finally {
    W.isSyncing = false;
  }
};

// Full cleanup: dedup local docs, wipe Google Drive, push clean
W.nukeAndRebuild = async id => {
  if (!confirm('This will:\n1. Deduplicate your local docs (keep newest of each title)\n2. Delete ALL files in Google Drive Writer Backups folder\n3. Push your clean local set fresh\n\nContinue?')) return;
  const conn = W.clouds.find(c => c.id === id);
  if (!conn) return;
  W.isSyncing = true;
  const statusEl = document.getElementById('cloud-status');
  try {
    // Step 1: Dedup local docs by title (keep the one with most content, or newest)
    if (statusEl) statusEl.innerHTML = `<div class="status-msg">// deduplicating local docs...</div>`;
    const byTitle = {};
    for (const d of W.docs) {
      if (!byTitle[d.title] || d.content.length > byTitle[d.title].content.length || (d.content.length === byTitle[d.title].content.length && d.updatedAt > byTitle[d.title].updatedAt)) {
        byTitle[d.title] = d;
      }
    }
    const keepers = new Set(Object.values(byTitle).map(d => d.id));
    const dupes = W.docs.filter(d => !keepers.has(d.id));
    for (const d of dupes) await W.dbDel('documents', d.id);
    W.docs = W.docs.filter(d => keepers.has(d.id));
    console.log(`[nuke] dedup: kept ${keepers.size}, removed ${dupes.length} duplicates`);

    // Step 2: Wipe Google Drive — delete all files in Writer Backups folder and the manifest
    const config = await W.ensureFreshToken(conn);
    const token = config.accessToken;

    // Find and delete Writer Backups folder contents
    if (statusEl) statusEl.innerHTML = `<div class="status-msg">// clearing Google Drive...</div>`;
    const sq = encodeURIComponent("name='Writer Backups' and mimeType='application/vnd.google-apps.folder' and trashed=false");
    const sr = await fetch(`https://www.googleapis.com/drive/v3/files?q=${sq}&fields=files(id)`,{headers:{Authorization:'Bearer '+token}});
    if (sr.ok) {
      const folders = (await sr.json()).files || [];
      for (const folder of folders) {
        // List all files in the folder
        const fq = encodeURIComponent(`'${folder.id}' in parents and trashed=false`);
        const fr = await fetch(`https://www.googleapis.com/drive/v3/files?q=${fq}&fields=files(id)&pageSize=1000`,{headers:{Authorization:'Bearer '+token}});
        if (fr.ok) {
          const files = (await fr.json()).files || [];
          if (statusEl) statusEl.innerHTML = `<div class="status-msg">// deleting ${files.length} files from Drive...</div>`;
          for (let i = 0; i < files.length; i += 5) {
            await Promise.allSettled(files.slice(i, i + 5).map(f =>
              fetch(`https://www.googleapis.com/drive/v3/files/${f.id}`,{method:'DELETE',headers:{Authorization:'Bearer '+token}})
            ));
          }
        }
        // Delete the folder itself
        await fetch(`https://www.googleapis.com/drive/v3/files/${folder.id}`,{method:'DELETE',headers:{Authorization:'Bearer '+token}});
      }
    }

    // Delete the manifest file if it exists
    if (config.syncFileId) {
      await fetch(`https://www.googleapis.com/drive/v3/files/${config.syncFileId}`,{method:'DELETE',headers:{Authorization:'Bearer '+token}}).catch(()=>{});
      delete config.syncFileId;
    }

    // Clear all gdrive file mappings
    delete config.gdriveFiles;
    delete config.driveFolderId;
    conn.config = JSON.stringify(config);
    conn.lastSyncAt = null;
    await W.dbPut('clouds', conn);

    // Step 3: Push clean
    if (statusEl) statusEl.innerHTML = `<div class="status-msg">// pushing ${W.docs.length} clean docs...</div>`;
    W.isSyncing = false;
    await W.cloudBackup(id);

    W.renderDocs();
    if (statusEl) statusEl.innerHTML = `<div class="status-msg">// rebuild complete: ${W.docs.length} docs pushed clean. now do reset&pull on other devices.</div>`;
    console.log(`[nuke] rebuild complete. ${W.docs.length} docs pushed.`);
  } catch(err) {
    if (statusEl) statusEl.innerHTML = `<div class="status-msg">// ERROR: ${W.esc(err.message||'unknown')}</div>`;
    console.error('[nuke] error:', err);
  } finally {
    W.isSyncing = false;
  }
};

W.restoreFromGDrive = async (config, conn, statusEl) => {
  const data = await W.gdrivePull(config, conn, statusEl);
  if (!data || !data.documents) { if (statusEl) statusEl.innerHTML = `<div class="status-msg">// no sync data in cloud yet. push first.</div>`; return; }
  const result = await W.mergeFromCloud(data, statusEl);
  if (statusEl) statusEl.innerHTML = `<div class="status-msg">// pull complete: ${result.imported} new, ${result.updated} updated, ${result.skipped} unchanged</div>`;
};

// ── Shared merge logic for all providers ───────────────────
W.mergeFromCloud = async (data, statusEl) => {
  // Save any unsaved editor content before merging to avoid data loss
  if (W.currentId) {
    const cur = W.docs.find(d => d.id === W.currentId);
    const edVal = document.getElementById('editor').value;
    if (cur && edVal !== cur.content) { cur.content = edVal; cur.updatedAt = W.now(); await W.dbPut('documents', cur); }
  }
  const cloudDocs = data.documents || [];
  const cloudFolders = data.folders || [];
  let imported = 0, updated = 0, skipped = 0;
  const conflicts = []; // docs where local was overwritten by cloud

  if (statusEl) statusEl.innerHTML = `<div class="status-msg">// merging ${cloudDocs.length} docs, ${cloudFolders.length} folders...</div>`;

  // Merge folders by ID
  for (const cf of cloudFolders) {
    const local = W.folders.find(f => f.id === cf.id);
    if (!local) {
      await W.dbPut('folders', cf);
      W.folders.push(cf);
    } else if (cf.name !== local.name) {
      local.name = cf.name;
      await W.dbPut('folders', local);
    }
  }

  // Merge documents by ID only (same UUID = same doc across all devices)
  for (const cd of cloudDocs) {
    const local = W.docs.find(d => d.id === cd.id);
    if (local) {
      if (cd.updatedAt > local.updatedAt) {
        // Cloud is newer — save local as a revision before overwriting
        if (local.content && local.content !== cd.content) {
          await W.dbPut('revisions', {id:W.uid(),documentId:local.id,content:local.content,wordCount:W.wc(local.content),createdAt:W.now(),name:'pre-sync backup'});
          conflicts.push(local.title);
        }
        local.title = cd.title;
        local.content = cd.content;
        local.folderId = cd.folderId;
        local.updatedAt = cd.updatedAt;
        local.wordCountGoal = cd.wordCountGoal;
        local.charCountGoal = cd.charCountGoal;
        await W.dbPut('documents', local);
        updated++;
      } else {
        skipped++;
      }
    } else {
      // Double-check IDB directly (W.docs may be stale)
      const inDB = await W.dbGet('documents', cd.id);
      if (inDB) {
        // Already in IDB but wasn't in W.docs — just update W.docs
        if (cd.updatedAt > inDB.updatedAt) { await W.dbPut('documents', cd); }
        skipped++;
      } else {
        // Genuinely new from cloud
        const clean = {id:cd.id,title:cd.title,content:cd.content,folderId:cd.folderId,createdAt:cd.createdAt,updatedAt:cd.updatedAt,wordCountGoal:cd.wordCountGoal||null,charCountGoal:cd.charCountGoal||null};
        await W.dbPut('documents', clean);
        imported++;
      }
    }
  }

  // Don't delete local docs/folders that are
  // missing from the cloud manifest. A missing doc could be a new local
  // doc that hasn't been pushed yet. Deletion is only handled explicitly
  // via W.deleteDoc which pushes immediately after deleting.

  // Reload everything
  W.docs = (await W.dbAll('documents')).sort((a,b) => b.updatedAt - a.updatedAt);
  W.folders = await W.dbAll('folders');
  W.renderDocs();
  if (W.currentId) {
    const doc = W.docs.find(d => d.id === W.currentId);
    if (doc) { document.getElementById('editor').value = doc.content; W.renderHighlight(); W.updateCounts(); document.getElementById('topbar-title').textContent = doc.title; }
  }
  console.log(`[sync] merge: ${imported} imported, ${updated} updated, ${skipped} skipped, ${conflicts.length} conflicts. local docs: ${W.docs.length}`);
  if (conflicts.length) W.showConflictBanner(conflicts);
  return { imported, updated, skipped, conflicts };
};

W.restoreFromDropbox = async (config, statusEl) => {
  const token = config.accessToken;
  const folder = config.folder || '';
  // Try to download writer-sync.json directly
  const path = folder ? `${folder}/writer-sync.json` : '/writer-sync.json';
  const dr = await fetch('https://content.dropboxapi.com/2/files/download', {
    method:'POST',
    headers:{Authorization:'Bearer '+token, 'Dropbox-API-Arg': JSON.stringify({path})}
  });
  if (!dr.ok) throw new Error('No sync file found in Dropbox. Push first.');
  const data = await dr.json();
  if (!data.documents) throw new Error('Sync file is empty or invalid.');
  const result = await W.mergeFromCloud(data, statusEl);
  if (statusEl) statusEl.innerHTML = `<div class="status-msg">// pull complete: ${result.imported} new, ${result.updated} updated, ${result.skipped} unchanged</div>`;
};

// ── Sync UI & auto-sync ────────────────────────────────────
W.updateSyncUI = (state, msg) => {
  const el = document.getElementById('sync-status');
  if (!W.clouds.length) { el.style.display = 'none'; return; }
  el.style.display = '';
  const auto = W.settings.autoSync === 'true';
  el.className = auto ? 'auto' : '';
  if (state === 'syncing') { el.className += ' syncing'; el.textContent = 'syncing...'; W.isSyncing = true; }
  else if (state === 'error') { el.className += ' error'; el.textContent = 'sync error'; W.isSyncing = false; }
  else {
    W.isSyncing = false;
    const lastConn = W.clouds.reduce((a,b) => (b.lastSyncAt||0) > (a.lastSyncAt||0) ? b : a, W.clouds[0]);
    const ago = lastConn.lastSyncAt ? W.timeAgo(lastConn.lastSyncAt) : 'never';
    el.textContent = (auto ? 'auto ' : '') + 'synced: ' + ago;
  }
};
W.timeAgo = ts => {
  const s = Math.floor((W.now() - ts) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
};
W.syncAll = async () => {
  if (W.isSyncing || !W.clouds.length || !navigator.onLine) { W.syncPending = true; return; }
  W.isSyncing = true;
  try {
    for (const c of W.clouds) { try { await W.cloudRestore(c.id, true); } catch {} }
    for (const c of W.clouds) { try { await W.cloudBackup(c.id, true); } catch {} }
  } finally {
    W.isSyncing = false;
    W.updateSyncUI('done');
  }
};
W.toggleAutoSync = async () => {
  const on = W.settings.autoSync !== 'true';
  await W.setSetting('autoSync', String(on));
  W.startAutoSync();
  W.updateSyncUI();
};
W.startAutoSync = () => {
  clearInterval(W.autoSyncTimer);
  W.autoSyncTimer = null;
  if (W.settings.autoSync === 'true' && W.clouds.length) {
    W.autoSyncTimer = setInterval(() => W.syncAll(), 5 * 60 * 1000);
  }
  W.updateSyncUI();
};

// Debounced cloud push — runs 30s after last local save
W.scheduleCloudPush = () => {
  if (!W.clouds.length || W.isSyncing) return;
  W.syncPending = true; // mark that we have unsynced changes
  clearTimeout(W.cloudPushTimer);
  if (!navigator.onLine) return; // don't try to sync offline — will sync on reconnect
  W.cloudPushTimer = setTimeout(() => { if (!W.isSyncing) W.syncAll(); }, 30000);
};

// ── Offline/online handling ────────────────────────────────
W.syncPending = false;
W.showConflictBanner = conflicts => {
  const el = document.getElementById('conflict-banner');
  if (!conflicts || !conflicts.length) { el.style.display = 'none'; return; }
  const names = conflicts.length <= 3 ? conflicts.map(n => '"' + W.esc(n) + '"').join(', ') : conflicts.slice(0,2).map(n => '"' + W.esc(n) + '"').join(', ') + ' +' + (conflicts.length - 2) + ' more';
  el.style.display = 'flex';
  el.innerHTML = `<span style="flex:1">sync conflict: ${names} was overwritten. local backup saved in versions.</span><button class="view-btn" onclick="W.openModal('revisions')">view</button><button class="dismiss" onclick="document.getElementById('conflict-banner').style.display='none'">&times;</button>`;
};

W.updateOnlineStatus = () => {
  const badge = document.getElementById('offline-badge');
  if (navigator.onLine) {
    badge.style.display = 'none';
    // Sync any pending changes when we come back online
    if (W.syncPending && W.clouds.length && !W.isSyncing) {
      W.syncPending = false;
      W.syncAll();
    }
  } else {
    badge.style.display = '';
  }
};
window.addEventListener('online', W.updateOnlineStatus);
window.addEventListener('offline', W.updateOnlineStatus);

W.localBackup = () => {
  const backup = JSON.stringify({
    v:2, exportedAt:new Date().toISOString(),
    documents:W.docs.map(d=>({id:d.id,title:d.title,content:d.content,folderId:d.folderId,createdAt:d.createdAt,updatedAt:d.updatedAt,wordCountGoal:d.wordCountGoal,charCountGoal:d.charCountGoal})),
    folders:W.folders.map(f=>({id:f.id,name:f.name,createdAt:f.createdAt})),
  },null,2);
  const blob = new Blob([backup],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `writer-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
};

W.localRestore = () => {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = async () => {
    const file = input.files?.[0]; if(!file)return;
    try {
      const data = JSON.parse(await file.text());
      if (!data.documents?.length) { alert('Invalid backup file'); return; }
      const result = await W.mergeFromCloud(data, null);
      alert(`Restored: ${result.imported} new, ${result.updated} updated, ${result.skipped} unchanged`);
    } catch { alert('Failed to read backup'); }
  };
  input.click();
};

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
(async () => {
  await W.initDB();
  await W.loadAll();
  W.applySettings();
  await W.handleOAuthReturn();
  if (W.docs.length) {
    W.selectDoc(W.docs[0].id);
  } else {
    const doc = {id:W.uid(),title:'My First Story',content:'',folderId:null,createdAt:W.now(),updatedAt:W.now(),wordCountGoal:null,charCountGoal:null};
    await W.dbPut('documents', doc);
    W.docs.push(doc);
    W.selectDoc(doc.id);
  }
  W.renderDocs();
  // Start with sidebar closed on mobile
  if (W.isMobile()) document.getElementById('sidebar').classList.add('closed');
  // Set up sync UI
  const syncEl = document.getElementById('sync-status');
  syncEl.addEventListener('click', () => W.syncAll());
  syncEl.addEventListener('contextmenu', e => { e.preventDefault(); W.toggleAutoSync(); });
  // On mobile, long-press for auto-sync toggle (no right-click)
  let syncLongPress;
  syncEl.addEventListener('touchstart', e => { syncLongPress = setTimeout(() => { e.preventDefault(); W.toggleAutoSync(); }, 600); });
  syncEl.addEventListener('touchend', () => clearTimeout(syncLongPress));
  syncEl.addEventListener('touchmove', () => clearTimeout(syncLongPress));
  W.startAutoSync();
  W.updateOnlineStatus();
  // Sync on open: pull then push (runs once, non-blocking)
  if (W.clouds.length) {
    W.syncAll().then(() => {
      console.log('[sync] startup sync complete. docs:', W.docs.length, 'folders:', W.folders.length);
    }).catch(e => { console.warn('[sync] startup sync failed:', e); });
  }
})();

// Service worker
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
</script>
</body>
