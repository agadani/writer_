<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>WRITER_ // Neural Draft Interface</title>

<link rel="manifest" href="/manifest.json">
<style>
/* ── Reset & Base ──────────────────────────────────────── */
:root{--bg:#0a0a12;--text:#05d9e8;--acc:#ff2a6d;--acc2:#f9f002;--cm:rgba(128,128,128,.5)}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:#e0e0e0;font-family:'Courier New',monospace}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:color-mix(in srgb,var(--text) 6%,transparent)}
::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--text) 35%,transparent);border-left:1px solid color-mix(in srgb,var(--text) 50%,transparent)}
::selection{background:color-mix(in srgb,var(--acc) 40%,transparent);color:#fff}
@keyframes glitch{0%,100%{text-shadow:2px 0 var(--acc),-2px 0 var(--text)}25%{text-shadow:-2px -1px var(--acc),2px 1px var(--text)}50%{text-shadow:1px 2px var(--acc),-1px -2px var(--text)}75%{text-shadow:-1px 1px var(--acc),1px -1px var(--text)}}
@keyframes flicker{0%,100%{opacity:1}3%{opacity:.85}6%{opacity:1}7%{opacity:.9}8%{opacity:1}92%{opacity:1}93%{opacity:.88}94%{opacity:1}}
.glitch{animation:glitch 3s ease-in-out infinite alternate}
.flicker{animation:flicker 8s linear infinite}
#app{display:flex;height:100%}
#sidebar{width:256px;min-width:256px;background:color-mix(in srgb,var(--bg) 85%,black);border-right:1px solid color-mix(in srgb,var(--text) 25%,transparent);display:flex;flex-direction:column;transition:width .3s,min-width .3s,opacity .3s;overflow:hidden;user-select:none}
#sidebar.closed{width:0;min-width:0;opacity:0}
#editor-area{flex:1;display:flex;flex-direction:column;min-width:0}
.sb-header{padding:16px;border-bottom:1px solid color-mix(in srgb,var(--text) 25%,transparent);position:relative;overflow:hidden}
.sb-header::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,color-mix(in srgb,var(--acc) 8%,transparent),transparent,color-mix(in srgb,var(--text) 8%,transparent))}
.sb-header h1{font-size:18px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--text);position:relative}
.sb-header p{font-size:10px;color:color-mix(in srgb,var(--text) 55%,transparent);letter-spacing:.3em;text-transform:uppercase;position:relative;margin-top:2px}
.sb-actions{padding:8px;border-bottom:1px solid color-mix(in srgb,var(--text) 25%,transparent);display:flex;gap:4px}
.sb-docs{flex:1;overflow-y:auto;padding:4px 0}
.sb-tools{border-top:1px solid color-mix(in srgb,var(--text) 25%,transparent);padding:8px}
.btn{padding:6px 10px;font-family:inherit;font-size:11px;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;transition:all .2s;border:none;outline:none}
.btn-cyan{background:linear-gradient(135deg,color-mix(in srgb,var(--text) 20%,transparent),color-mix(in srgb,var(--text) 8%,transparent));border:1px solid color-mix(in srgb,var(--text) 50%,transparent);color:var(--text);clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px))}
.btn-cyan:hover{background:linear-gradient(135deg,color-mix(in srgb,var(--text) 35%,transparent),color-mix(in srgb,var(--text) 15%,transparent));box-shadow:0 0 10px color-mix(in srgb,var(--text) 70%,transparent);color:#fff}
.btn-pink{background:linear-gradient(135deg,color-mix(in srgb,var(--acc) 25%,transparent),color-mix(in srgb,var(--acc) 8%,transparent));border:1px solid color-mix(in srgb,var(--acc) 50%,transparent);color:var(--acc);clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px))}
.btn-pink:hover{background:linear-gradient(135deg,color-mix(in srgb,var(--acc) 40%,transparent),color-mix(in srgb,var(--acc) 15%,transparent));box-shadow:0 0 10px color-mix(in srgb,var(--acc) 70%,transparent);color:#fff}
.btn-yellow{background:linear-gradient(135deg,color-mix(in srgb,var(--acc2) 20%,transparent),color-mix(in srgb,var(--acc2) 6%,transparent));border:1px solid color-mix(in srgb,var(--acc2) 50%,transparent);color:var(--acc2);clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px))}
.btn-yellow:hover{background:linear-gradient(135deg,color-mix(in srgb,var(--acc2) 30%,transparent),color-mix(in srgb,var(--acc2) 12%,transparent));box-shadow:0 0 10px color-mix(in srgb,var(--acc2) 60%,transparent);color:#fff}
.folder-item{padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:background .15s;user-select:none}
.folder-item:hover{background:color-mix(in srgb,var(--acc) 8%,transparent)}
.folder-item .arrow{font-size:9px;color:color-mix(in srgb,var(--acc) 50%,transparent);width:12px;text-align:center;flex-shrink:0}
.folder-item .fname{font-size:11px;color:var(--acc);text-transform:uppercase;letter-spacing:.15em;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.folder-item .fcount{font-size:9px;color:color-mix(in srgb,var(--text) 40%,transparent)}
.folder-item.drop-target{background:color-mix(in srgb,var(--acc) 15%,transparent);outline:1px dashed var(--acc)}
.doc-item{padding:8px 12px;cursor:pointer;border-left:2px solid transparent;transition:all .15s}
.doc-item.nested{padding-left:30px}
.doc-item:hover{background:color-mix(in srgb,var(--text) 8%,transparent)}
.doc-item.active{background:color-mix(in srgb,var(--text) 12%,transparent);border-left-color:var(--text)}
.doc-item .title{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:color-mix(in srgb,var(--text) 60%,#888)}
.doc-item.active .title{color:var(--text)}
.doc-item .meta{font-size:10px;color:color-mix(in srgb,var(--text) 50%,transparent);margin-top:2px}
.doc-item.dragging{opacity:.4}
.drop-above{border-top:2px solid var(--text)!important}
.root-drop{border-top:2px dashed color-mix(in srgb,var(--text) 40%,transparent);margin:2px 12px;height:0;transition:height .15s}
.root-drop.drop-target{height:8px;border-color:var(--text);background:color-mix(in srgb,var(--text) 8%,transparent)}
.tool-btn{display:block;width:100%;text-align:left;background:none;border:none;color:color-mix(in srgb,var(--text) 65%,transparent);padding:6px 12px;font-family:inherit;font-size:11px;text-transform:uppercase;letter-spacing:.15em;cursor:pointer;transition:all .15s}
.tool-btn:hover{color:var(--text);background:color-mix(in srgb,var(--text) 10%,transparent)}
.tool-btn.pink{color:color-mix(in srgb,var(--acc) 70%,transparent)}.tool-btn.pink:hover{color:var(--acc);background:color-mix(in srgb,var(--acc) 10%,transparent)}
.tool-btn.yellow{color:color-mix(in srgb,var(--acc2) 70%,transparent)}.tool-btn.yellow:hover{color:var(--acc2);background:color-mix(in srgb,var(--acc2) 10%,transparent)}
#topbar{display:flex;align-items:center;padding:4px 12px;border-bottom:1px solid color-mix(in srgb,var(--text) 20%,transparent);font-size:12px;flex-shrink:0}
#topbar button{background:none;border:none;color:color-mix(in srgb,var(--text) 60%,transparent);cursor:pointer;padding:4px;transition:color .15s}
#topbar button:hover{color:var(--text)}
#topbar .doc-title{color:color-mix(in srgb,var(--text) 60%,transparent);font-size:11px;text-transform:uppercase;letter-spacing:.15em;margin-left:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;transition:color .15s}
#topbar .doc-title:hover{color:var(--text);text-decoration:underline;text-underline-offset:3px;text-decoration-color:color-mix(in srgb,var(--text) 40%,transparent)}
#topbar .shortcuts{margin-left:auto;font-size:10px;color:color-mix(in srgb,var(--text) 55%,transparent);text-transform:uppercase;letter-spacing:.1em}
#topbar .shortcuts span{cursor:pointer;padding:2px 4px;border-radius:2px;transition:color .15s,background .15s}
#topbar .shortcuts span:hover{color:var(--text);background:color-mix(in srgb,var(--text) 10%,transparent)}
#editor-wrap{position:relative;flex:1;overflow:hidden}
/* Highlight overlay: laid out at full document height, translated to follow scroll.
   Transform-based sync is sub-pixel accurate; assigning scrollTop is not. */
#editor-highlight{position:absolute;left:0;right:0;top:0;padding:32px 64px;font-family:ui-monospace,"SF Mono","Menlo","Roboto Mono","Droid Sans Mono","Courier New",Consolas,monospace,monospace;font-size:18px;line-height:1.8;white-space:pre-wrap;overflow-wrap:break-word;word-break:normal;pointer-events:none;border:none;letter-spacing:0;word-spacing:normal;font-kerning:none;font-variant-ligatures:none;font-feature-settings:normal;-webkit-text-size-adjust:100%;text-size-adjust:100%;tab-size:4;-moz-tab-size:4;will-change:transform;transform:translate3d(0,0,0);line-break:auto;hyphens:none;-webkit-hyphens:none}
#editor-highlight .cm{color:var(--cm);opacity:1;filter:none}
#editor{position:absolute;inset:0;width:100%;height:100%;resize:none;outline:none;padding:32px 64px;border:0;font-family:ui-monospace,"SF Mono","Menlo","Roboto Mono","Droid Sans Mono","Courier New",Consolas,monospace,monospace;font-size:18px;line-height:1.8;color:transparent;caret-color:var(--acc);background:transparent;scrollbar-width:none;-webkit-text-fill-color:transparent;-webkit-appearance:none;appearance:none;border-radius:0;letter-spacing:0;word-spacing:normal;font-kerning:none;font-variant-ligatures:none;font-feature-settings:normal;-webkit-text-size-adjust:100%;text-size-adjust:100%;tab-size:4;-moz-tab-size:4;white-space:pre-wrap;overflow-wrap:break-word;word-break:normal;vertical-align:top;line-break:auto;hyphens:none;-webkit-hyphens:none}
#editor::-webkit-scrollbar{width:0;height:0;display:none}
#editor::placeholder{-webkit-text-fill-color:color-mix(in srgb,var(--text) 40%,transparent)}

#conflict-banner{padding:6px 12px;font-size:10px;font-family:inherit;text-transform:uppercase;letter-spacing:.1em;background:color-mix(in srgb,var(--acc2) 8%,transparent);border-bottom:1px solid color-mix(in srgb,var(--acc2) 25%,transparent);color:var(--acc2);display:flex;align-items:center;gap:8px;flex-shrink:0}
#conflict-banner .dismiss{background:none;border:none;color:color-mix(in srgb,var(--acc2) 60%,transparent);font-family:inherit;font-size:12px;cursor:pointer;padding:0 4px;transition:color .15s}
#conflict-banner .dismiss:hover{color:var(--acc2)}
#conflict-banner .view-btn{background:none;border:1px solid color-mix(in srgb,var(--acc2) 30%,transparent);color:var(--acc2);font-family:inherit;font-size:9px;padding:2px 8px;cursor:pointer;text-transform:uppercase;letter-spacing:.1em;transition:all .15s}
#conflict-banner .view-btn:hover{background:color-mix(in srgb,var(--acc2) 15%,transparent)}
#statusbar{display:flex;justify-content:space-between;padding:6px 16px;font-size:11px;text-transform:uppercase;letter-spacing:.1em;opacity:.7;transition:opacity .2s;border-top:1px solid color-mix(in srgb,var(--text) 20%,transparent)}
#statusbar:hover{opacity:1}
#ver-btn:hover{color:var(--acc2);border-color:color-mix(in srgb,var(--acc2) 60%,transparent);background:color-mix(in srgb,var(--acc2) 10%,transparent)}
#sync-status{font-size:9px;padding:2px 8px;border:1px solid color-mix(in srgb,var(--text) 30%,transparent);color:color-mix(in srgb,var(--text) 70%,transparent);transition:all .15s;user-select:none}
#sync-status:hover{color:var(--text);border-color:color-mix(in srgb,var(--text) 60%,transparent);background:color-mix(in srgb,var(--text) 10%,transparent)}
#sync-status.syncing{color:var(--acc2);border-color:color-mix(in srgb,var(--acc2) 40%,transparent)}
#sync-status.error{color:var(--acc);border-color:color-mix(in srgb,var(--acc) 40%,transparent)}
#sync-status.auto{border-left:3px solid var(--text)}
#statusbar .left{display:flex;gap:16px;color:color-mix(in srgb,var(--text) 80%,transparent)}
#statusbar .right{display:flex;gap:12px;align-items:center}
.modal-bg{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(4px)}
.modal{background:linear-gradient(180deg,color-mix(in srgb,var(--bg) 80%,#1a1a2e),var(--bg));border:1px solid color-mix(in srgb,var(--text) 30%,transparent);box-shadow:0 0 40px color-mix(in srgb,var(--text) 10%,transparent);width:100%;max-height:90vh;overflow-y:auto;position:relative}
.modal::before,.modal::after{content:'';position:absolute;width:12px;height:12px;border-color:var(--text);pointer-events:none}
.modal::before{top:-1px;left:-1px;border-top:2px solid;border-left:2px solid}
.modal::after{bottom:-1px;right:-1px;border-bottom:2px solid;border-right:2px solid}
.modal-sm{max-width:420px}.modal-md{max-width:520px}.modal-lg{max-width:640px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px;border-bottom:1px solid color-mix(in srgb,var(--text) 25%,transparent)}
.modal-head h2{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.2em}
.modal-head .close{background:none;border:none;color:color-mix(in srgb,var(--acc) 80%,transparent);font-family:inherit;font-size:16px;cursor:pointer;transition:color .15s}
.modal-head .close:hover{color:var(--acc)}
.modal-body{padding:16px}
.modal-body label{display:block;font-size:10px;color:color-mix(in srgb,var(--text) 70%,transparent);text-transform:uppercase;letter-spacing:.15em;margin-bottom:4px}
.modal-body select,.modal-body input[type=text],.modal-body input[type=password]{width:100%;background:color-mix(in srgb,var(--bg) 90%,black);border:1px solid color-mix(in srgb,var(--text) 35%,transparent);padding:8px 12px;color:var(--text);font-family:inherit;font-size:12px;outline:none;transition:border-color .15s}
.modal-body select:focus,.modal-body input[type=text]:focus,.modal-body input[type=password]:focus{border-color:color-mix(in srgb,var(--text) 60%,transparent);box-shadow:0 0 8px color-mix(in srgb,var(--text) 15%,transparent)}
.modal-body input[type=range]{width:100%;-webkit-appearance:none;height:3px;background:color-mix(in srgb,var(--text) 25%,transparent);outline:none;margin:8px 0}
.modal-body input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--text);box-shadow:0 0 6px color-mix(in srgb,var(--text) 60%,transparent);cursor:pointer;transform:rotate(45deg)}
.modal-body input[type=color]{width:100%;height:32px;border:1px solid color-mix(in srgb,var(--text) 35%,transparent);background:transparent;cursor:pointer;padding:0}
.modal-body input[type=checkbox]{accent-color:var(--text)}
.modal-body hr{border:none;height:1px;background:linear-gradient(90deg,transparent,color-mix(in srgb,var(--text) 50%,transparent),color-mix(in srgb,var(--acc) 50%,transparent),transparent);margin:12px 0}
.field{margin-bottom:12px}
.status-msg{padding:8px;border:1px solid color-mix(in srgb,var(--acc2) 40%,transparent);background:color-mix(in srgb,var(--acc2) 8%,transparent);font-size:11px;color:var(--acc2);margin-bottom:12px}
#ctx-menu{position:fixed;z-index:60;background:linear-gradient(180deg,color-mix(in srgb,var(--bg) 80%,#1a1a2e),var(--bg));border:1px solid color-mix(in srgb,var(--text) 35%,transparent);min-width:140px;padding:4px 0;display:none;box-shadow:0 4px 20px rgba(0,0,0,.5)}
#ctx-menu button{display:block;width:100%;text-align:left;background:none;border:none;padding:6px 12px;font-family:inherit;font-size:11px;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;transition:background .15s}
#ctx-menu .rename{color:var(--text)}#ctx-menu .rename:hover{background:color-mix(in srgb,var(--text) 15%,transparent)}
#ctx-menu .delete{color:var(--acc)}#ctx-menu .delete:hover{background:color-mix(in srgb,var(--acc) 15%,transparent)}
.rev-list{width:240px;border-right:1px solid color-mix(in srgb,var(--text) 20%,transparent);overflow-y:auto;flex-shrink:0}
.rev-item{padding:10px 12px;cursor:pointer;border-bottom:1px solid color-mix(in srgb,var(--text) 10%,transparent);border-left:2px solid transparent;font-size:11px;color:color-mix(in srgb,var(--text) 75%,transparent);transition:all .15s}
.rev-item:hover{background:color-mix(in srgb,var(--text) 8%,transparent)}
.rev-item.active{background:color-mix(in srgb,var(--text) 12%,transparent);border-left-color:var(--text)}
.rev-preview{flex:1;overflow:hidden;padding:16px;background:color-mix(in srgb,var(--bg) 90%,black);font-size:12px;color:color-mix(in srgb,var(--text) 75%,transparent);line-height:1.6;display:flex;flex-direction:column}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-card{padding:12px;border:1px solid color-mix(in srgb,var(--text) 20%,transparent);background:color-mix(in srgb,var(--text) 4%,transparent)}
.stat-card .lbl{font-size:9px;text-transform:uppercase;letter-spacing:.15em}
.stat-card .val{font-size:18px;margin-top:2px}
.chart{display:flex;align-items:flex-end;gap:1px;height:96px;padding:8px;border:1px solid color-mix(in srgb,var(--text) 20%,transparent);background:color-mix(in srgb,var(--text) 3%,transparent)}
.chart-bar{flex:1;background:linear-gradient(to top,color-mix(in srgb,var(--text) 80%,transparent),color-mix(in srgb,var(--acc) 50%,transparent));box-shadow:0 0 4px color-mix(in srgb,var(--text) 40%,transparent);transition:height .2s;position:relative;min-height:1px}
.export-btn{display:flex;justify-content:space-between;align-items:center;width:100%;padding:12px;border:1px solid color-mix(in srgb,var(--text) 25%,transparent);background:none;color:color-mix(in srgb,var(--text) 85%,transparent);font-family:inherit;font-size:12px;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;transition:all .15s;margin-bottom:6px}
.export-btn:hover{border-color:color-mix(in srgb,var(--text) 50%,transparent);background:color-mix(in srgb,var(--text) 10%,transparent);color:var(--text)}
.export-btn .tag{font-size:10px;opacity:.5}
.cloud-card{display:flex;align-items:center;gap:8px;padding:12px;border:1px solid color-mix(in srgb,var(--text) 20%,transparent);background:color-mix(in srgb,var(--text) 4%,transparent);margin-bottom:8px}
.cloud-card .info{flex:1;overflow:hidden}.cloud-card .name{font-size:12px;color:var(--text)}.cloud-card .sub{font-size:9px;color:color-mix(in srgb,var(--text) 55%,transparent);margin-top:2px}
.provider-btn{padding:12px;border:1px solid color-mix(in srgb,var(--text) 25%,transparent);background:none;color:var(--text);font-family:inherit;font-size:12px;text-transform:uppercase;cursor:pointer;transition:all .15s;text-align:left}
.provider-btn:hover{border-color:color-mix(in srgb,var(--text) 50%,transparent);background:color-mix(in srgb,var(--text) 10%,transparent)}
.provider-btn .desc{font-size:9px;color:color-mix(in srgb,var(--text) 55%,transparent);margin-top:2px;text-transform:none}
/* ── Split pane ─────────────────────────────────────────── */
#split-container{display:flex;flex:1;overflow:hidden}
#split-container>.pane{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
#split-container>.pane+.pane{border-left:1px solid color-mix(in srgb,var(--text) 20%,transparent)}
.pane-bar{display:flex;align-items:center;gap:6px;padding:3px 8px;font-size:10px;border-bottom:1px solid color-mix(in srgb,var(--text) 15%,transparent);flex-shrink:0;background:color-mix(in srgb,var(--bg) 85%,black)}
.pane-bar select{background:color-mix(in srgb,var(--bg) 90%,black);border:1px solid color-mix(in srgb,var(--text) 25%,transparent);color:var(--text);font-family:inherit;font-size:10px;padding:3px 6px;outline:none;text-transform:uppercase;letter-spacing:.1em;max-width:200px}
.pane-bar .pane-close{background:none;border:none;color:color-mix(in srgb,var(--acc) 60%,transparent);font-family:inherit;font-size:14px;cursor:pointer;padding:2px 6px;transition:color .15s}
.pane-bar .pane-close:hover{color:var(--acc)}
.pane-bar .pane-label{color:color-mix(in srgb,var(--text) 50%,transparent);text-transform:uppercase;letter-spacing:.1em}
.pane .editor-wrap-r{position:relative;flex:1;overflow:hidden}
.pane .editor-hl-r{position:absolute;left:0;right:0;top:0;padding:16px 32px;white-space:pre-wrap;overflow-wrap:break-word;word-break:normal;pointer-events:none;border:none;letter-spacing:0;word-spacing:normal;font-kerning:none;font-variant-ligatures:none;font-feature-settings:normal;-webkit-text-size-adjust:100%;text-size-adjust:100%;tab-size:4;-moz-tab-size:4;will-change:transform;transform:translate3d(0,0,0);line-break:auto;hyphens:none;-webkit-hyphens:none}
.pane .editor-hl-r .cm{color:var(--cm);opacity:1;filter:none}
.pane .editor-r{position:absolute;inset:0;width:100%;height:100%;resize:none;outline:none;padding:16px 32px;border:0;color:transparent;caret-color:var(--acc);background:transparent;-webkit-text-fill-color:transparent;-webkit-appearance:none;appearance:none;border-radius:0;letter-spacing:0;word-spacing:normal;font-kerning:none;font-variant-ligatures:none;font-feature-settings:normal;-webkit-text-size-adjust:100%;text-size-adjust:100%;tab-size:4;-moz-tab-size:4;white-space:pre-wrap;overflow-wrap:break-word;word-break:normal;scrollbar-width:none;line-break:auto;hyphens:none;-webkit-hyphens:none;vertical-align:top}
.pane .editor-r::-webkit-scrollbar{width:0;height:0;display:none}
.pane .editor-r[readonly]{caret-color:transparent}

<body>
<div id="app">
<div id="sb-backdrop" onclick="W.closeSidebar()"></div>
<!-- Sidebar -->
<div id="sidebar">
  <div class="sb-header">
    <h1 class="glitch" onclick="W.oblique()" style="cursor:pointer" title="Need inspiration?">WRITER<span style="color:var(--acc)">_</span></h1>
    <p>// neural_draft_v2.3</p>
  </div>
  <div class="sb-actions">
    <button class="btn btn-cyan" style="flex:1" onclick="W.createDoc()">+ Doc</button>
    <button class="btn btn-pink" onclick="W.createFolder()">+ Folder</button>
  </div>
  <div class="sb-docs" id="doc-list"></div>
  <div class="sb-tools">
    <button class="tool-btn" onclick="W.openModal('stats')">&gt; statistics</button>
    <button class="tool-btn" onclick="W.openModal('revisions')">&gt; versions</button>
    <button class="tool-btn yellow" onclick="W.openModal('export')">&gt; export</button>
    <button class="tool-btn yellow" onclick="W.openModal('import')">&gt; import</button>
    <button class="tool-btn pink" onclick="W.openModal('cloud')">&gt; cloud_sync</button>
    <button class="tool-btn" onclick="W.openModal('settings')">&gt; config</button>
  </div>
</div>
<!-- Editor area -->
<div id="editor-area">
  <div id="topbar">
    <button onclick="W.toggleSidebar()" title="Ctrl+B"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="3" width="14" height="2"/><rect x="1" y="7" width="10" height="2"/><rect x="1" y="11" width="14" height="2"/></svg></button>
    <span class="doc-title" id="topbar-title" onclick="W.startRenameInline()" title="Click to rename" style="cursor:pointer"></span>
    <span class="shortcuts"><span onclick="W.toggleSidebar()" title="Toggle sidebar (Ctrl+B)">^B:panel</span> // <span onclick="W.createDoc()" title="New document (Ctrl+N)">^N:new</span> // <span onclick="W.saveDoc()" title="Save (Ctrl+S)">^S:save</span> // <span onclick="W.toggleSplit()" title="Split view (Ctrl+\\)">^\\:split</span></span>

  </div>
  <div id="conflict-banner" style="display:none"></div>
  <div id="split-container">
    <div class="pane" id="left-pane">
      <div id="editor-wrap">
        <div id="editor-highlight" class="flicker"></div>
        <textarea id="editor" placeholder=">> begin_transmission..." spellcheck="true"></textarea>
      </div>
    </div>
    <div class="pane" id="right-pane" style="display:none">
      <div class="pane-bar">
        <span class="pane-label">open:</span>
        <select id="rp-select" onchange="W.rpSelect(this.value)"></select>
        <div style="flex:1"></div>
        <button class="pane-close" onclick="W.closeSplit()">[x]</button>
      </div>
      <div class="editor-wrap-r">
        <div class="editor-hl-r" id="rp-highlight"></div>
        <textarea class="editor-r" id="rp-editor" placeholder="// select a document or version..." spellcheck="true"></textarea>
      </div>
    </div>
  </div>
  <div id="statusbar">
    <div class="left"><span id="offline-badge" style="display:none;font-size:9px;padding:2px 6px;border:1px solid color-mix(in srgb,var(--acc) 50%,transparent);color:var(--acc)">offline</span><span id="wc">words:0</span><span id="cc">chars:0</span><span id="goal-display"></span></div>
    <div class="right"><span id="hemi-badge" style="display:none;font-size:9px;padding:2px 6px;border:1px solid color-mix(in srgb,var(--acc) 50%,transparent);color:var(--acc)">hemingway_lock</span><span id="ver-btn" onclick="W.saveNamedVersion()" style="font-size:9px;padding:2px 8px;border:1px solid color-mix(in srgb,var(--acc2) 30%,transparent);color:color-mix(in srgb,var(--acc2) 70%,transparent);cursor:pointer;transition:all .15s;user-select:none" title="Save a named version">save_version</span><span id="sync-status" style="display:none;cursor:pointer" title="Click to sync now, right-click to toggle auto-sync"></span><span id="save-status"></span></div>
  </div>
</div>
</div>
<!-- Context menu -->
<div id="ctx-menu"><button class="rename" onclick="W.renameCtx()">&gt; rename</button><button class="rename" id="ctx-move" onclick="W.moveCtx()" style="display:none">&gt; move_to...</button><button class="delete" onclick="W.deleteCtx()">&gt; delete</button></div>
<!-- Modal container -->
<div id="modal-root"></div>

<script>
// ═══════════════════════════════════════════════════════════
// WRITER_ — Complete app in vanilla JS
// ═══════════════════════════════════════════════════════════
//
// ── CONFIGURATION ─────────────────────────────────────────
// To enable "Sign in with Google/Dropbox/OneDrive", register
// a free OAuth app with each provider and paste the client ID
// below. Set the redirect URI to your deployed site's URL.
// Leave blank to hide that provider's sign-in button.
//
// Google & OneDrive also need a client secret set server-side:
//   npx wrangler pages secret put GOOGLE_CLIENT_SECRET --project-name writer
//   npx wrangler pages secret put ONEDRIVE_CLIENT_SECRET --project-name writer
// Dropbox works without a secret (pure PKCE).
//
const CONFIG = {
  GOOGLE_CLIENT_ID:   '944165390471-htiaundshtp09tplu32dmcvspbiagar7.apps.googleusercontent.com',
  DROPBOX_CLIENT_ID:  '',  // https://www.dropbox.com/developers/apps
  ONEDRIVE_CLIENT_ID: '', // https://portal.azure.com/#blade/Microsoft_AAD_RegisteredApps
};
// ──────────────────────────────────────────────────────────

const W = {};

// ── State ──────────────────────────────────────────────────
W.docs = [];       // {id,title,content,folderId,createdAt,updatedAt,wordCountGoal,charCountGoal}
W.folders = [];    // {id,name,createdAt}
W.revisions = [];  // {id,documentId,content,wordCount,createdAt,name?}
W.sessions = [];   // {id,documentId,wordsWritten,startedAt,endedAt}
W.clouds = [];     // {id,provider,name,config,lastSyncAt,createdAt}
W.currentId = null;
W.settings = {};
W.ctxTarget = null;
W.saveTimer = null;
W.revTimer = null;
W.sessionStart = Date.now();
W.sessionStartWords = 0;
W.autoSyncTimer = null;
W.isSyncing = false;
W.cloudPushTimer = null;
W.collapsedFolders = new Set();
W.dragDocId = null;

const DEFAULTS = {theme:'cyberpunk',fontFamily:'mono',fontSize:'18',lineSpacing:'1.8',
  paperColor:'#0a0a12',textColor:'#05d9e8',soundEnabled:'false',soundType:'mechanical',hemingwayMode:'false',commentOpen:'%%',commentClose:'%%',commentColor:'#555555'};

// ── IndexedDB ──────────────────────────────────────────────
W.db = null;
W.initDB = () => new Promise((resolve, reject) => {
  const req = indexedDB.open('writer-cf', 1);
  req.onupgradeneeded = e => {
    const db = e.target.result;
    if (!db.objectStoreNames.contains('documents')) {
      const ds = db.createObjectStore('documents', {keyPath:'id'});
      ds.createIndex('by-updated','updatedAt');
    }
    if (!db.objectStoreNames.contains('folders')) db.createObjectStore('folders', {keyPath:'id'});
    if (!db.objectStoreNames.contains('revisions')) {
      const rs = db.createObjectStore('revisions', {keyPath:'id'});
      rs.createIndex('by-document','documentId');
    }
    if (!db.objectStoreNames.contains('sessions')) db.createObjectStore('sessions', {keyPath:'id'});
    if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', {keyPath:'key'});
    if (!db.objectStoreNames.contains('clouds')) db.createObjectStore('clouds', {keyPath:'id'});
  };
  req.onsuccess = e => { W.db = e.target.result; resolve(); };
  req.onerror = e => reject(e);
});

W.uid = () => crypto.randomUUID();
W.dbPut = (store, obj) => new Promise((r,j) => { const tx = W.db.transaction(store,'readwrite'); tx.objectStore(store).put(obj); tx.oncomplete=()=>r(); tx.onerror=e=>j(e); });
W.dbGet = (store, key) => new Promise((r,j) => { const tx = W.db.transaction(store); const req = tx.objectStore(store).get(key); req.onsuccess=()=>r(req.result); req.onerror=e=>j(e); });
W.dbAll = (store) => new Promise((r,j) => { const tx = W.db.transaction(store); const req = tx.objectStore(store).getAll(); req.onsuccess=()=>r(req.result); req.onerror=e=>j(e); });
W.dbDel = (store, key) => new Promise((r,j) => { const tx = W.db.transaction(store,'readwrite'); tx.objectStore(store).delete(key); tx.oncomplete=()=>r(); tx.onerror=e=>j(e); });
W.dbIdx = (store, idx, key) => new Promise((r,j) => { const tx = W.db.transaction(store); const req = tx.objectStore(store).index(idx).getAll(key); req.onsuccess=()=>r(req.result); req.onerror=e=>j(e); });

// ── Helpers ────────────────────────────────────────────────
W.wc = s => { const t = s.trim(); return t ? t.split(/\s+/).length : 0; };
W.cc = s => s.length;
W.now = () => Date.now();

// ── Settings ───────────────────────────────────────────────
W.loadSettings = async () => {
  const all = await W.dbAll('settings');
  W.settings = {...DEFAULTS};
  for (const s of all) W.settings[s.key] = s.value;
};
W.setSetting = async (k, v) => { W.settings[k] = v; await W.dbPut('settings', {key:k, value:v}); W.applySettings(); };
W.applySettings = () => {
  const ed = document.getElementById('editor');
  const hl = document.getElementById('editor-highlight');
  const s = W.settings;
  const r = document.documentElement.style;
  // Set CSS custom properties — drives the entire UI theme
  r.setProperty('--bg', s.paperColor);
  r.setProperty('--text', s.textColor);
  r.setProperty('--acc', s.accentColor || '#ff2a6d');
  r.setProperty('--acc2', s.accent2Color || '#f9f002');
  r.setProperty('--cm', s.commentColor || '#555555');
  // Font stack: avoid the generic `monospace` keyword as the primary, because
  // Chrome (esp. Android) resolves it differently inside <textarea> vs <div>,
  // producing different ascent/descent → cursor drifts vertically per line.
  // Stack uses concrete names that exist on each platform; ends with the
  // doubled-monospace trick so the final fallback ignores the UA's form-control
  // default and uses the user-agent's *CSS* monospace instead.
  const ff = s.fontFamily === 'serif'
    ? '"Iowan Old Style","Apple Garamond",Baskerville,Georgia,"Times New Roman",serif'
    : s.fontFamily === 'sans'
      ? '-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif'
      : 'ui-monospace,"SF Mono","Menlo","Roboto Mono","Droid Sans Mono","Courier New",Consolas,monospace,monospace';
  // Use integer px line-height so textarea + overlay div agree on every line box
  // (mobile browsers, esp. Android Chrome, round line-box heights differently in
  // textareas vs divs when given a unitless multiplier — causes cursor drift.)
  const lhPx = Math.round(parseFloat(s.fontSize) * parseFloat(s.lineSpacing)) + 'px';
  // Textarea (invisible text, visible caret)
  ed.style.fontSize = s.fontSize + 'px';
  ed.style.lineHeight = lhPx;
  ed.style.fontFamily = ff;
  // Highlight overlay (visible text)
  hl.style.backgroundColor = s.paperColor;
  hl.style.color = s.textColor;
  hl.style.fontSize = s.fontSize + 'px';
  hl.style.lineHeight = lhPx;
  hl.style.fontFamily = ff;
  hl.style.textShadow = `0 0 1px ${s.textColor}40`;
  document.getElementById('topbar').style.backgroundColor = s.paperColor;
  document.getElementById('statusbar').style.backgroundColor = s.paperColor;
  document.getElementById('hemi-badge').style.display = s.hemingwayMode === 'true' ? '' : 'none';
  W.renderHighlight();
};

// ── Highlight rendering (%%...%% comments) ─────────────────
W.renderHighlight = () => {
  const ed = document.getElementById('editor');
  const hl = document.getElementById('editor-highlight');
  hl.innerHTML = W.highlightComments(ed.value) + '\n';
  if (W._syncHL) W._syncHL();
};

// Shared comment highlighting logic (supports different open/close markers)
W.highlightComments = text => {
  const open = W.settings.commentOpen || '%%';
  const close = W.settings.commentClose || '%%';
  const eOpen = W.escHL(open);
  const eClose = W.escHL(close);
  let html = '';
  let pos = 0;
  while (pos < text.length) {
    const start = text.indexOf(open, pos);
    if (start === -1) { html += W.escHL(text.slice(pos)); break; }
    // Found open marker — look for close
    const afterOpen = start + open.length;
    const end = text.indexOf(close, afterOpen);
    if (end === -1) {
      // Unclosed — render rest as plain text including the open marker
      html += W.escHL(text.slice(pos));
      break;
    }
    // Render text before the comment, then the comment
    html += W.escHL(text.slice(pos, start));
    html += '<span class="cm">' + eOpen + W.escHL(text.slice(afterOpen, end)) + eClose + '</span>';
    pos = end + close.length;
  }
  return html;
};
W.escHL = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// Sync scroll between textarea and highlight overlay using transform.
// Assigning hl.scrollTop = ed.scrollTop is sub-pixel-lossy on high-DPI mobile
// (especially Android Chrome at fractional dpr), causing the highlight to drift
// from the textarea's actual rendered text after scrolling through a long doc.
// translate3d is GPU-composited and sub-pixel accurate.
(() => {
  const ed = document.getElementById('editor');
  const hl = document.getElementById('editor-highlight');
  const sync = () => {
    hl.style.transform = 'translate3d(' + (-ed.scrollLeft) + 'px,' + (-ed.scrollTop) + 'px,0)';
  };
  ed.addEventListener('scroll', sync, {passive:true});
  // Resync after any layout change that could move the textarea's content origin
  window.addEventListener('resize', sync);
  // Expose so renderHighlight can call after updating content
  W._syncHL = sync;
})();

// ── Load all data ──────────────────────────────────────────
W.loadAll = async () => {
  W.docs = (await W.dbAll('documents')).sort((a,b) => b.updatedAt - a.updatedAt);
  W.folders = await W.dbAll('folders');
  W.revisions = await W.dbAll('revisions');
  W.sessions = await W.dbAll('sessions');
  W.clouds = await W.dbAll('clouds');
  await W.loadSettings();
};

// ── Render doc list ────────────────────────────────────────
W.renderDocs = () => {
  const el = document.getElementById('doc-list');
  let html = '';
  // Folders
  for (const f of W.folders) {
    const docsIn = W.docs.filter(d => d.folderId === f.id);
    const collapsed = W.collapsedFolders.has(f.id);
    const arrow = collapsed ? '&#9654;' : '&#9660;';
    html += `<div class="folder-item" onclick="W.toggleFolder('${f.id}')" oncontextmenu="W.ctxFolder(event,'${f.id}')" ondragover="W.folderDragOver(event,'${f.id}')" ondragleave="W.folderDragLeave(event)" ondrop="W.folderDrop(event,'${f.id}')" data-folder="${f.id}"><span class="arrow">${arrow}</span><span class="fname">${W.esc(f.name)}/</span><span class="fcount">${docsIn.length}</span></div>`;
    if (!collapsed) {
      for (const d of docsIn) html += W.docItemHTML(d, true);
    }
  }
  // Drop zone for moving docs to root
  html += `<div class="root-drop" ondragover="W.rootDragOver(event)" ondragleave="W.rootDragLeave(event)" ondrop="W.rootDrop(event)"></div>`;
  // Root docs
  for (const d of W.docs.filter(d => !d.folderId)) html += W.docItemHTML(d, false);
  if (!W.docs.length && !W.folders.length) html = '<div style="padding:16px;text-align:center;font-size:11px;color:color-mix(in srgb,var(--text) 50%,transparent)">// no files found</div>';
  el.innerHTML = html;
};
W.docItemHTML = (d, nested) => {
  const active = d.id === W.currentId ? ' active' : '';
  const nest = nested ? ' nested' : '';
  const words = W.wc(d.content);
  const date = new Date(d.updatedAt);
  const ds = date.toDateString() === new Date().toDateString() ? date.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : date.toLocaleDateString([],{month:'short',day:'numeric'});
  return `<div class="doc-item${active}${nest}" draggable="true" ondragstart="W.docDragStart(event,'${d.id}')" ondragend="W.docDragEnd(event)" onclick="W.selectDoc('${d.id}')" oncontextmenu="W.ctxDoc(event,'${d.id}')" data-doc="${d.id}"><div class="title">${W.esc(d.title)}</div><div class="meta">${ds} // ${words}w</div></div>`;
};
W.esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── Folder toggle ──────────────────────────────────────────
W.toggleFolder = id => {
  if (W.collapsedFolders.has(id)) W.collapsedFolders.delete(id);
  else W.collapsedFolders.add(id);
  W.renderDocs();
};

// ── Drag and drop ──────────────────────────────────────────
W.docDragStart = (e, id) => {
  W.dragDocId = id;
  e.target.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', id);
};
W.docDragEnd = e => {
  W.dragDocId = null;
  e.target.classList.remove('dragging');
  document.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
};
W.folderDragOver = (e, folderId) => {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drop-target');
};
W.folderDragLeave = e => {
  e.currentTarget.classList.remove('drop-target');
};
W.folderDrop = async (e, folderId) => {
  e.preventDefault();
  e.currentTarget.classList.remove('drop-target');
  const docId = W.dragDocId || e.dataTransfer.getData('text/plain');
  if (!docId) return;
  const doc = W.docs.find(d => d.id === docId);
  if (!doc || doc.folderId === folderId) return;
  doc.folderId = folderId;
  doc.updatedAt = W.now();
  await W.dbPut('documents', doc);
  W.collapsedFolders.delete(folderId);
  W.renderDocs();
  W.scheduleCloudPush();
};
W.rootDragOver = e => {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drop-target');
};
W.rootDragLeave = e => {
  e.currentTarget.classList.remove('drop-target');
};
W.rootDrop = async e => {
  e.preventDefault();
  e.currentTarget.classList.remove('drop-target');
  const docId = W.dragDocId || e.dataTransfer.getData('text/plain');
  if (!docId) return;
  const doc = W.docs.find(d => d.id === docId);
  if (!doc || !doc.folderId) return;
  doc.folderId = null;
  doc.updatedAt = W.now();
  await W.dbPut('documents', doc);
  W.renderDocs();
  W.scheduleCloudPush();
};

// ── Document CRUD ──────────────────────────────────────────
W.createDoc = async () => {
  const doc = {id:W.uid(),title:'Untitled',content:'',folderId:null,createdAt:W.now(),updatedAt:W.now(),wordCountGoal:null,charCountGoal:null};
  await W.dbPut('documents', doc);
  W.docs.unshift(doc);
  W.selectDoc(doc.id);
  W.renderDocs();
  W.startRenameInline();
  W.scheduleCloudPush();
};
W.selectDoc = async id => {
  // Save session for previous doc
  if (W.currentId) {
    const ed = document.getElementById('editor');
    const words = W.wc(ed.value) - W.sessionStartWords;
    if (words > 0) { await W.dbPut('sessions', {id:W.uid(),documentId:W.currentId,wordsWritten:words,startedAt:W.sessionStart,endedAt:W.now()}); }
  }
  W.currentId = id;
  const doc = W.docs.find(d => d.id === id);
  if (!doc) return;
  const ed = document.getElementById('editor');
  ed.value = doc.content;
  document.getElementById('topbar-title').textContent = doc.title;
  W.renderHighlight();
  W.updateCounts();
  W.sessionStart = W.now();
  W.sessionStartWords = W.wc(doc.content);
  W.renderDocs();
  if (W.isMobile()) W.closeSidebar();
  if (W.splitOpen) W.rpPopulateSelect();
  ed.focus();
};
W.saveDoc = async () => {
  const doc = W.docs.find(d => d.id === W.currentId);
  if (!doc) return;
  doc.content = document.getElementById('editor').value;
  doc.updatedAt = W.now();
  await W.dbPut('documents', doc);
  document.getElementById('save-status').textContent = 'saved:' + new Date().toLocaleTimeString();
  // If right pane shows same doc, sync it (but preserve cursor)
  if (W.splitOpen && W.rpDocId === W.currentId) {
    const rp = document.getElementById('rp-editor');
    if (rp.value !== doc.content && document.activeElement !== rp) { rp.value = doc.content; W.rpRenderHL(); }
  }

};
W.deleteDoc = async id => {
  if (!confirm('Delete this document?')) return;
  // Delete Google Doc from Drive if it exists
  for (const c of W.clouds) {
    try {
      const cfg = JSON.parse(c.config);
      if (cfg.gdriveFiles?.[id]) {
        const config = await W.ensureFreshToken(c);
        await fetch(`https://www.googleapis.com/drive/v3/files/${cfg.gdriveFiles[id]}`,{method:'DELETE',headers:{Authorization:'Bearer '+config.accessToken}}).catch(()=>{});
        delete cfg.gdriveFiles[id];
        c.config = JSON.stringify(cfg);
        await W.dbPut('clouds', c);
      }
    } catch {}
  }
  await W.dbDel('documents', id);
  W.docs = W.docs.filter(d => d.id !== id);
  if (W.currentId === id) { W.currentId = null; document.getElementById('editor').value = ''; document.getElementById('editor-highlight').innerHTML = '\n'; document.getElementById('topbar-title').textContent = ''; }
  if (W.docs.length && !W.currentId) W.selectDoc(W.docs[0].id);
  W.renderDocs();
  // Push immediately (push only, no pull — pull would re-import the deleted doc)
  if (W.clouds.length && !W.isSyncing) {
    clearTimeout(W.cloudPushTimer);
    for (const c of W.clouds) W.cloudBackup(c.id, true);
  }
};
W.renameDoc = async id => {
  const doc = W.docs.find(d => d.id === id);
  if (!doc) return;
  const name = prompt('New title:', doc.title);
  if (!name || !name.trim()) return;
  doc.title = name.trim();
  await W.dbPut('documents', doc);
  if (id === W.currentId) document.getElementById('topbar-title').textContent = doc.title;
  W.renderDocs();
};
W.startRenameInline = () => {
  const doc = W.docs.find(d => d.id === W.currentId);
  if (!doc) return;
  const el = document.getElementById('topbar-title');
  if (el.querySelector('input')) return; // already editing
  const origText = el.textContent;
  el.textContent = '';
  const input = document.createElement('input');
  input.type = 'text';
  input.value = doc.title;
  input.style.cssText = 'background:transparent;border:none;border-bottom:1px solid var(--text);color:var(--text);font-family:inherit;font-size:11px;text-transform:uppercase;letter-spacing:.15em;outline:none;width:200px;padding:0;margin:0';
  let done = false;
  const finish = async () => {
    if (done) return; done = true;
    const v = input.value.trim();
    if (v && v !== doc.title) { doc.title = v; await W.dbPut('documents', doc); W.renderDocs(); }
    el.textContent = doc.title;
  };
  input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); input.blur(); } if (e.key === 'Escape') { input.value = doc.title; input.blur(); } });
  input.addEventListener('blur', finish);
  el.appendChild(input);
  input.focus();
  input.select();
};

W.createFolder = async () => {

  W.folders.push(f);
  W.renderDocs();

  const el = document.querySelector(`[data-folder="${f.id}"] .fname`);

  const input = document.createElement('input');

  let done = false;
  const finish = async () => {
    if (done) return; done = true;
    const v = input.value.trim();
    if (v) { f.name = v; await W.dbPut('folders', f); }
    W.renderDocs();
  };
  input.addEventListener('keydown', e => { if (e.key==='Enter') { e.preventDefault(); input.blur(); } if (e.key==='Escape') { done=true; W.renderDocs(); } });

};
W.renameFolder = async id => {

W.ctxFolder = (e, id) => { e.preventDefault(); W.ctxTarget = {type:'folder',id}; W.showCtx(e.clientX, e.clientY, false); };
W.showCtx = (x, y, showMove) => {

  m.style.display='block';

  m.style.left = Math.min(x, window.innerWidth - mw) + 'px';
  m.style.top = Math.min(y, window.innerHeight - mh) + 'px';
};
W.hideCtx = () => { const m=document.getElementById('ctx-menu'); m.style.display='none'; m.innerHTML='<button class="rename" onclick="W.renameCtx()">&gt; rename</button><button class="rename" id="ctx-move" onclick="W.moveCtx()" style="display:none">&gt; move_to...</button><button class="delete" onclick="W.deleteCtx()">&gt; delete</button>'; W.ctxTarget=null; };
W.renameCtx = () => { if (!W.ctxTarget) return; W.ctxTarget.type==='doc' ? W.renameDoc(W.ctxTarget.id) : W.renameFolder(W.ctxTarget.id); W.hideCtx(); };
W.deleteCtx = () => { if (!W.ctxTarget) return; W.ctxTarget.type==='doc' ? W.deleteDoc(W.ctxTarget.id) : W.deleteFolder(W.ctxTarget.id); W.hideCtx(); };
W.moveCtx = () => {
  if (!W.ctxTarget || W.ctxTarget.type !== 'doc') return;
  const doc = W.docs.find(d => d.id === W.ctxTarget.id);
  if (!doc) { W.hideCtx(); return; }

  const m = document.getElementById('ctx-menu');

    html += `<button style="display:block;width:100%;text-align:left;background:none;border:none;padding:8px 12px;font-family:inherit;font-size:11px;color:var(--text);cursor:pointer;text-transform:uppercase;letter-spacing:.1em" onmouseover="this.style.background='color-mix(in srgb,var(--text) 10%,transparent)'" onmouseout="this.style.background='none'" onclick="W.moveDocTo('${doc.id}',null)">&gt; root</button>`;
  }
  for (const f of W.folders) {
    if (f.id === doc.folderId) continue;
    html += `<button style="display:block;width:100%;text-align:left;background:none;border:none;padding:8px 12px;font-family:inherit;font-size:11px;color:var(--acc);cursor:pointer;text-transform:uppercase;letter-spacing:.1em" onmouseover="this.style.background='color-mix(in srgb,var(--acc) 10%,transparent)'" onmouseout="this.style.background='none'" onclick="W.moveDocTo('${doc.id}','${f.id}')">&gt; ${W.esc(f.name)}/</button>`;

W.moveDocTo = async (docId, folderId) => {

  document.getElementById('ctx-menu').innerHTML = '<button class="rename" onclick="W.renameCtx()">&gt; rename</button><button class="rename" id="ctx-move" onclick="W.moveCtx()" style="display:none">&gt; move_to...</button><button class="delete" onclick="W.deleteCtx()">&gt; delete</button>';

// ── Touch long-press for context menu (mobile) ─────────────
(function(){
  let timer, tx, ty, target;
  const THRESHOLD = 10; // max movement before cancel
  document.getElementById('doc-list').addEventListener('touchstart', e => {
    const t = e.touches[0];
    tx = t.clientX; ty = t.clientY;
    target = e.target.closest('.doc-item, .folder-item');
    if (!target) return;
    timer = setTimeout(() => {
      e.preventDefault();
      const docId = target.dataset?.doc;
      const folderId = target.dataset?.folder;
      if (docId) W.ctxDoc({preventDefault(){},clientX:tx,clientY:ty}, docId);
      else if (folderId) W.ctxFolder({preventDefault(){},clientX:tx,clientY:ty}, folderId);
    }, 500);
  }, {passive:false});
  document.getElementById('doc-list').addEventListener('touchmove', e => {
    if (!timer) return;
    const t = e.touches[0];
    if (Math.abs(t.clientX-tx)>THRESHOLD || Math.abs(t.clientY-ty)>THRESHOLD) clearTimeout(timer);
  });
  document.getElementById('doc-list').addEventListener('touchend', () => clearTimeout(timer));
  document.getElementById('doc-list').addEventListener('touchcancel', () => clearTimeout(timer));
})();

  // Desktop: play sounds from keydown (works because physical keyboard events are user gestures)
  if (!W.isMobile() && s.soundEnabled==='true') { if (e.key==='Enter') W.playReturn(s.soundType); else if (e.key.length===1) W.playKeystroke(s.soundType); }
  if ((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); W.saveDoc(); const doc = W.docs.find(d=>d.id===W.currentId); if(doc) W.dbPut('revisions',{id:W.uid(),documentId:doc.id,content:document.getElementById('editor').value,wordCount:W.wc(document.getElementById('editor').value),createdAt:W.now()}); }
});
// Mobile: play sounds from input event (virtual keyboard keydown isn't a user gesture on Android)
document.getElementById('editor').addEventListener('input', e => {
  if (W.isMobile() && W.settings.soundEnabled==='true') {
    if (e.inputType === 'insertLineBreak' || e.inputType === 'insertParagraph') W.playReturn(W.settings.soundType);

});

  if (otherDoc) W.rpSelect('doc:' + otherDoc.id);
  else W.rpSelect('');
};

W.closeSplit = () => {
  W.splitOpen = false;
  W.rpDocId = null;
  W.rpRevId = null;
  document.getElementById('right-pane').style.display = 'none';

};

W.rpPopulateSelect = () => {
  const sel = document.getElementById('rp-select');
  let html = '<option value="">-- select --</option>';
  html += '<option value="new">+ new document</option>';
  html += '<optgroup label="Documents">';
  for (const d of W.docs) {
    const tag = d.id === W.currentId ? ' (current)' : '';
    html += `<option value="doc:${d.id}"${W.rpDocId===d.id?' selected':''}>${W.esc(d.title)}${tag}</option>`;
  }
  html += '</optgroup>';
  // Versions of current doc
  const revs = W.revisions.filter(r => r.documentId === W.currentId).sort((a,b) => b.createdAt - a.createdAt);
  if (revs.length) {
    html += '<optgroup label="Versions (current doc)">';
    for (const r of revs) {
      const d = new Date(r.createdAt);
      const label = r.name || (d.toLocaleDateString() + ' ' + d.toLocaleTimeString());
      html += `<option value="rev:${r.id}"${W.rpRevId===r.id?' selected':''}>${W.esc(label)} (${r.wordCount}w)</option>`;
    }
    html += '</optgroup>';
  }
  sel.innerHTML = html;
};

W.rpSelect = async val => {
  if (!val) { W.rpDocId = null; W.rpRevId = null; W.rpRender('', true); return; }
  if (val === 'new') {
    const doc = {id:W.uid(),title:'Untitled',content:'',folderId:null,createdAt:W.now(),updatedAt:W.now(),wordCountGoal:null,charCountGoal:null};
    await W.dbPut('documents', doc);
    W.docs.unshift(doc);
    W.renderDocs();
    W.rpDocId = doc.id; W.rpRevId = null;
    W.rpPopulateSelect();
    W.rpRender('', false);
    return;
  }
  const [type, id] = val.split(':');
  if (type === 'doc') {
    W.rpDocId = id; W.rpRevId = null;
    const doc = W.docs.find(d => d.id === id);
    if (doc) W.rpRender(doc.content, false);
  } else if (type === 'rev') {
    W.rpRevId = id; W.rpDocId = null;
    const rev = W.revisions.find(r => r.id === id);
    if (rev) W.rpRender(rev.content, true);
  }
};

W.rpRender = (content, readonly) => {
  const ed = document.getElementById('rp-editor');
  const hl = document.getElementById('rp-highlight');
  const s = W.settings;
  const ff = s.fontFamily === 'serif'
    ? '"Iowan Old Style","Apple Garamond",Baskerville,Georgia,"Times New Roman",serif'
    : s.fontFamily === 'sans'
      ? '-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif'
      : 'ui-monospace,"SF Mono","Menlo","Roboto Mono","Droid Sans Mono","Courier New",Consolas,monospace,monospace';
  const lhPx = Math.round(parseFloat(s.fontSize) * parseFloat(s.lineSpacing)) + 'px';

  ed.readOnly = readonly;
  ed.style.fontFamily = ff;
  ed.style.fontSize = s.fontSize + 'px';
  ed.style.lineHeight = lhPx;
  hl.style.backgroundColor = s.paperColor;
  hl.style.color = s.textColor;
  hl.style.fontFamily = ff;
  hl.style.fontSize = s.fontSize + 'px';
  hl.style.lineHeight = lhPx;
  hl.style.textShadow = `0 0 1px ${s.textColor}40`;
  W.rpRenderHL();
};

W.rpRenderHL = () => {

};

let audioCtx = null;
let audioUnlocked = false;

function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function unlockAudio() {
  if (audioUnlocked && audioCtx && audioCtx.state === 'running') return;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const c = audioCtx;
    if (c.state === 'suspended') {
      c.resume().then(() => {
        const b = c.createBuffer(1, 1, c.sampleRate);
        const s = c.createBufferSource();
        s.buffer = b;
        s.connect(c.destination);
        s.start(0);
        audioUnlocked = true;
      });
    } else {
      audioUnlocked = true;
    }
  } catch {}
}

// Unlock on any real user gesture
['touchstart','touchend','mousedown','click','keydown'].forEach(evt => {
  document.addEventListener(evt, unlockAudio, {passive:true});
});

W.playSound = (fn, c) => { try { fn(c); } catch {} };
W.playKeystroke = type => {
  try {
    const c = getAC();
    if (c.state === 'suspended') { c.resume(); return; } // will play next time
    ({mechanical:skMech,electric:skElec,laser:skLaser,sandstorm:skSand,birdsong:skBird})[type]?.(c);
  } catch {}
};
W.playReturn = type => {
  try {
    const c = getAC();
    if (c.state === 'suspended') { c.resume(); return; }
    ({mechanical:srMech,electric:srElec,laser:srLaser,sandstorm:srSand,birdsong:srBird})[type]?.(c);
  } catch {}
};

W.doExport = fmt => {
  const doc = W.docs.find(d => d.id === W.currentId);

    const body = doc.content.split('\n').map(p=>p.trim()?`<p>${W.esc(p)}</p>`:'').join('\n');
    blob = new Blob([`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${W.esc(doc.title)}</title><style>body{max-width:700px;margin:40px auto;padding:0 20px;font:18px/1.8 Georgia,serif;color:#333}h1{font-size:2em}</style></head><body><h1>${W.esc(doc.title)}</h1>${body}</body></html>`],{type:'text/html'});

// ── Docx builder (minimal valid .docx) ─────────────────────
W.buildDocx = (content, title) => {
  const enc = new TextEncoder();
  const escXml = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Build paragraphs XML
  const paras = content.split('\n').map(line =>
    `<w:p><w:r><w:t xml:space="preserve">${escXml(line)}</w:t></w:r></w:p>`
  ).join('');

  const docXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main">
<w:body>${paras}</w:body></w:document>`;

  const contentTypes = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
<Default Extension="xml" ContentType="application/xml"/>
<Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/>
</Types>`;

  const rels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
<Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/>
</Relationships>`;

  const wordRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
</Relationships>`;

  const files = [
    {name:'[Content_Types].xml', data:enc.encode(contentTypes)},
    {name:'_rels/.rels', data:enc.encode(rels)},
    {name:'word/_rels/document.xml.rels', data:enc.encode(wordRels)},
    {name:'word/document.xml', data:enc.encode(docXml)},
  ];
  return new Blob([W.buildZip(files)], {type:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'});
};

// Minimal ZIP builder (store only, no compression)
W.buildZip = files => {
  const enc = new TextEncoder();
  const entries = [];
  const parts = [];
  let offset = 0;
  for (const file of files) {
    const nameBytes = enc.encode(file.name);
    const header = new Uint8Array(30 + nameBytes.length);
    const hv = new DataView(header.buffer);
    hv.setUint32(0, 0x04034b50, true);
    hv.setUint16(4, 20, true);
    hv.setUint16(8, 0, true); // store
    hv.setUint32(14, W.crc32(file.data), true);
    hv.setUint32(18, file.data.length, true);
    hv.setUint32(22, file.data.length, true);
    hv.setUint16(26, nameBytes.length, true);
    header.set(nameBytes, 30);
    entries.push({name:nameBytes, data:file.data, offset});
    parts.push(header, file.data);
    offset += header.length + file.data.length;
  }
  const cdStart = offset;
  for (const e of entries) {
    const cd = new Uint8Array(46 + e.name.length);
    const cv = new DataView(cd.buffer);
    cv.setUint32(0, 0x02014b50, true);
    cv.setUint16(4, 20, true);
    cv.setUint16(6, 20, true);
    cv.setUint32(16, W.crc32(e.data), true);
    cv.setUint32(20, e.data.length, true);
    cv.setUint32(24, e.data.length, true);
    cv.setUint16(28, e.name.length, true);
    cv.setUint32(42, e.offset, true);
    cd.set(e.name, 46);
    parts.push(cd);
    offset += cd.length;
  }
  const eocd = new Uint8Array(22);
  const ev = new DataView(eocd.buffer);
  ev.setUint32(0, 0x06054b50, true);
  ev.setUint16(8, entries.length, true);
  ev.setUint16(10, entries.length, true);
  ev.setUint32(12, offset - cdStart, true);
  ev.setUint32(16, cdStart, true);
  parts.push(eocd);
  const total = parts.reduce((s, p) => s + p.length, 0);
  const result = new Uint8Array(total);
  let pos = 0;
  for (const p of parts) { result.set(p, pos); pos += p.length; }
  return result;
};

W.crc32 = data => {
  let crc = 0xffffffff;
  for (let i = 0; i < data.length; i++) {
    crc ^= data[i];
    for (let j = 0; j < 8; j++) crc = (crc >>> 1) ^ (crc & 1 ? 0xedb88320 : 0);
  }
  return (crc ^ 0xffffffff) >>> 0;
};

// ── Docx parser (extract plain text from .docx zip) ────────
W.parseDocx = async file => {
  const buf = await file.arrayBuffer();
  const bytes = new Uint8Array(buf);
  // Find document.xml inside the zip
  const files = W.unzip(bytes);
  const docXml = files['word/document.xml'];
  if (!docXml) throw new Error('Not a valid .docx file');
  const xml = new TextDecoder().decode(docXml);
  // Extract text from <w:t> tags, <w:p> = paragraph break
  let text = '';
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'application/xml');
  const paragraphs = doc.getElementsByTagName('w:p');
  for (let i = 0; i < paragraphs.length; i++) {
    const runs = paragraphs[i].getElementsByTagName('w:t');
    let line = '';
    for (let j = 0; j < runs.length; j++) line += runs[j].textContent || '';
    text += line + '\n';
  }
  return text.replace(/\n+$/, '');
};

// Minimal zip reader (store + deflate via DecompressionStream)
W.unzip = bytes => {
  const files = {};
  const view = new DataView(bytes.buffer, bytes.byteOffset, bytes.byteLength);
  let pos = 0;
  while (pos < bytes.length - 4) {
    const sig = view.getUint32(pos, true);
    if (sig !== 0x04034b50) break; // local file header
    const method = view.getUint16(pos + 8, true);
    const compSize = view.getUint32(pos + 18, true);
    const uncompSize = view.getUint32(pos + 22, true);
    const nameLen = view.getUint16(pos + 26, true);
    const extraLen = view.getUint16(pos + 28, true);
    const name = new TextDecoder().decode(bytes.slice(pos + 30, pos + 30 + nameLen));
    const dataStart = pos + 30 + nameLen + extraLen;
    const raw = bytes.slice(dataStart, dataStart + compSize);
    if (method === 0) {
      files[name] = raw; // stored
    } else if (method === 8) {
      files[name] = { deflated: raw, size: uncompSize }; // mark for decompression
    }
    pos = dataStart + compSize;
  }
  return files;
};

// Override parseDocx to handle deflated entries
const _origParseDocx = W.parseDocx;
W.parseDocx = async file => {
  const buf = await file.arrayBuffer();
  const bytes = new Uint8Array(buf);
  const raw = W.unzip(bytes);
  // Decompress any deflated entries
  const files = {};
  for (const [name, data] of Object.entries(raw)) {
    if (data.deflated) {
      try {
        // Use DecompressionStream (available in modern browsers)
        const ds = new DecompressionStream('raw-deflate');
        const writer = ds.writable.getWriter();
        writer.write(data.deflated);
        writer.close();
        const reader = ds.readable.getReader();
        const chunks = [];
        while (true) { const {done, value} = await reader.read(); if (done) break; chunks.push(value); }
        const total = chunks.reduce((s, c) => s + c.length, 0);
        const result = new Uint8Array(total);
        let offset = 0;
        for (const c of chunks) { result.set(c, offset); offset += c.length; }
        files[name] = result;
      } catch { files[name] = data.deflated; } // fallback: try raw
    } else {
      files[name] = data;
    }
  }
  const docXml = files['word/document.xml'];
  if (!docXml) throw new Error('Not a valid .docx file');
  const xml = new TextDecoder().decode(docXml);
  let text = '';
  const parser = new DOMParser();
  const doc = parser.parseFromString(xml, 'application/xml');
  const paragraphs = doc.getElementsByTagName('w:p');
  for (let i = 0; i < paragraphs.length; i++) {
    const runs = paragraphs[i].getElementsByTagName('w:t');
    let line = '';
    for (let j = 0; j < runs.length; j++) line += runs[j].textContent || '';
    text += line + '\n';
  }
  return text.replace(/\n+$/, '');
};

W._importAfterOpen = async () => {
  // Called after modal renders
  const conn = W.clouds.find(c => c.provider === 'google-drive');
  if (!conn) return;
  const statusEl = document.getElementById('import-status');
  const listEl = document.getElementById('import-list');
  if (!statusEl || !listEl) return;
  try {
    const config = await W.ensureFreshToken(conn);
    const token = config.accessToken;
    // List Google Docs (not in trash), sorted by recent
    const q = encodeURIComponent("mimeType='application/vnd.google-apps.document' and trashed=false");
    const r = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,modifiedTime,parents)&orderBy=modifiedTime desc&pageSize=50`,{headers:{Authorization:'Bearer '+token}});
    if (!r.ok) throw new Error(await r.text());
    const files = (await r.json()).files || [];
    if (!files.length) { statusEl.textContent = '// no Google Docs found in your Drive'; return; }
    statusEl.textContent = `// ${files.length} docs found. click to import.`;
    listEl.innerHTML = files.map(f => {
      const date = new Date(f.modifiedTime);
      const ds = date.toLocaleDateString([],{month:'short',day:'numeric',year:'numeric'});
      const already = W.docs.some(d => d.title === f.name);
      const tag = already ? '<span style="color:var(--acc);margin-left:6px;font-size:9px">exists</span>' : '';
      return `<div class="doc-item" style="cursor:pointer" onclick="W.importGDoc('${f.id}','${W.esc(f.name).replace(/'/g,"\\'")}')"><div class="title">${W.esc(f.name)}${tag}</div><div class="meta">${ds}</div></div>`;
    }).join('');
  } catch(err) {
    statusEl.textContent = '// ERROR: ' + (err.message || 'failed to list files');
  }
};

W.importGDoc = async (fileId, name) => {
  const statusEl = document.getElementById('import-status');
  if (statusEl) statusEl.textContent = `// importing "${name}"...`;
  try {
    const conn = W.clouds.find(c => c.provider === 'google-drive');
    if (!conn) throw new Error('No Google Drive connection');
    const config = await W.ensureFreshToken(conn);
    const r = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}/export?mimeType=text/plain`,{headers:{Authorization:'Bearer '+config.accessToken}});
    if (!r.ok) throw new Error(await r.text());
    const content = (await r.text()).replace(/^\uFEFF/,'').replace(/\s+$/,'');
    const doc = {id:W.uid(),title:name,content,folderId:null,createdAt:W.now(),updatedAt:W.now(),wordCountGoal:null,charCountGoal:null};
    await W.dbPut('documents', doc);
    W.docs.unshift(doc);
    W.renderDocs();
    W.selectDoc(doc.id);
    W.scheduleCloudPush();
    if (statusEl) statusEl.textContent = `// imported "${name}" (${W.wc(content)} words)`;
  } catch(err) {
    if (statusEl) statusEl.textContent = '// ERROR: ' + (err.message || 'import failed');
  }
};

};

// ── Diff engine ────────────────────────────────────────────
// Simple line-based diff (Myers-like, O(nd))
W.diffLines = (a, b) => {
  const al = a.split('\n'), bl = b.split('\n');
  const result = [];
  // LCS via dynamic programming
  const m = al.length, n = bl.length;
  // For very long docs, fall back to simple comparison
  if (m * n > 500000) {
    // Simple: show all of a as removed, all of b as added
    al.forEach(l => result.push({type:'-',text:l}));
    bl.forEach(l => result.push({type:'+',text:l}));
    return result;
  }
  const dp = Array.from({length:m+1}, () => new Uint16Array(n+1));
  for (let i=1;i<=m;i++) for (let j=1;j<=n;j++) dp[i][j] = al[i-1]===bl[j-1] ? dp[i-1][j-1]+1 : Math.max(dp[i-1][j],dp[i][j-1]);
  // Backtrack
  let i=m, j=n;
  const ops = [];
  while (i>0 || j>0) {
    if (i>0 && j>0 && al[i-1]===bl[j-1]) { ops.push({type:' ',text:al[i-1]}); i--; j--; }
    else if (j>0 && (i===0 || dp[i][j-1] >= dp[i-1][j])) { ops.push({type:'+',text:bl[j-1]}); j--; }
    else { ops.push({type:'-',text:al[i-1]}); i--; }
  }
  return ops.reverse();
};

// ═══════════════════════════════════════════════════════════
// CLOUD BACKUP — OAuth PKCE (no server secrets needed)
// ═══════════════════════════════════════════════════════════
// Google, Dropbox, and OneDrive all support OAuth PKCE for
// public clients. The entire auth flow happens in-browser.
// Client IDs are set in the CONFIG block at the top of this file.

// ── PKCE helpers ───────────────────────────────────────────
W.pkce = {};
W.pkce.generateVerifier = () => {
  const arr = new Uint8Array(32);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
};
W.pkce.sha256 = async str => {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
};

// Provider configs (auth URLs, token URLs, scopes)
W.PROVIDERS = {
  'google-drive': {
    name: 'Google Drive',
    authUrl: 'https://accounts.google.com/o/oauth2/v2/auth',
    tokenUrl: 'https://oauth2.googleapis.com/token',
    scope: 'https://www.googleapis.com/auth/drive.file https://www.googleapis.com/auth/drive.appdata https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email',
    clientId: CONFIG.GOOGLE_CLIENT_ID,
    needsServerToken: true, // Google requires client_secret for web apps
  },
  'dropbox': {
    name: 'Dropbox',
    authUrl: 'https://www.dropbox.com/oauth2/authorize',
    tokenUrl: 'https://api.dropboxapi.com/oauth2/token',
    scope: '',
    clientId: CONFIG.DROPBOX_CLIENT_ID,
    needsServerToken: false, // Dropbox supports pure PKCE
  },
  'onedrive': {
    name: 'OneDrive',
    authUrl: 'https://login.microsoftonline.com/common/oauth2/v2.0/authorize',
    tokenUrl: 'https://login.microsoftonline.com/common/oauth2/v2.0/token',
    scope: 'Files.ReadWrite offline_access',
    clientId: CONFIG.ONEDRIVE_CLIENT_ID,
    needsServerToken: true, // OneDrive requires client_secret for web apps
  },
};

// ── Start OAuth PKCE flow ──────────────────────────────────
W.oauthConnect = async provider => {
  const p = W.PROVIDERS[provider];
  if (!p || !p.clientId) return;
  const verifier = W.pkce.generateVerifier();
  const challenge = await W.pkce.sha256(verifier);
  // Store verifier + provider in localStorage (persists across tabs)
  const oauthState = crypto.randomUUID();
  localStorage.setItem('oauth_verifier', verifier);
  localStorage.setItem('oauth_provider', provider);
  localStorage.setItem('oauth_state', oauthState);
  const redirectUri = window.location.origin + window.location.pathname;
  const params = new URLSearchParams({
    client_id: p.clientId,
    redirect_uri: redirectUri,
    response_type: 'code',
    code_challenge: challenge,
    code_challenge_method: 'S256',
    state: oauthState,
  });
  if (p.scope) params.set('scope', p.scope);
  // Dropbox needs token_access_type for refresh tokens
  if (provider === 'dropbox') params.set('token_access_type', 'offline');
  // Google needs access_type + prompt for refresh tokens
  if (provider === 'google-drive') { params.set('access_type', 'offline'); params.set('prompt', 'consent'); }
  window.location.href = p.authUrl + '?' + params.toString();
};

// ── Fetch user display name from provider API ──────────────
W.fetchUserName = async (provider, token) => {
  try {
    if (provider === 'google-drive') {
      const r = await fetch('https://www.googleapis.com/oauth2/v2/userinfo', { headers: { Authorization: 'Bearer ' + token } });
      if (r.ok) { const d = await r.json(); return d.name || d.email || 'Google Drive'; }
    } else if (provider === 'dropbox') {
      const r = await fetch('https://api.dropboxapi.com/2/users/get_current_account', { method: 'POST', headers: { Authorization: 'Bearer ' + token } });
      if (r.ok) { const d = await r.json(); return d.name?.display_name || d.email || 'Dropbox'; }
    } else if (provider === 'onedrive') {
      const r = await fetch('https://graph.microsoft.com/v1.0/me', { headers: { Authorization: 'Bearer ' + token } });
      if (r.ok) { const d = await r.json(); return d.displayName || d.userPrincipalName || 'OneDrive'; }
    }
  } catch {}
  return null;
};

// ── Handle OAuth return (called on page load) ──────────────
W.handleOAuthReturn = async () => {
  const url = new URL(window.location.href);
  const code = url.searchParams.get('code');
  const state = url.searchParams.get('state');
  const savedState = localStorage.getItem('oauth_state');
  if (!code || !state || state !== savedState) return;
  // Clean URL
  history.replaceState(null, '', url.pathname);
  const provider = localStorage.getItem('oauth_provider');
  const verifier = localStorage.getItem('oauth_verifier');
  localStorage.removeItem('oauth_provider');
  localStorage.removeItem('oauth_verifier');
  localStorage.removeItem('oauth_state');
  if (!provider || !verifier) return;
  const p = W.PROVIDERS[provider];
  if (!p || !p.clientId) return;
  const redirectUri = url.origin + url.pathname;
  try {
    let res;
    if (p.needsServerToken) {
      // Exchange via server-side function (attaches client_secret)
      res = await fetch('/api/oauth/token', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ provider, client_id: p.clientId, code, code_verifier: verifier, redirect_uri: redirectUri }),
      });
    } else {
      // Pure PKCE — exchange directly with provider
      const body = new URLSearchParams({ client_id: p.clientId, code, code_verifier: verifier, grant_type: 'authorization_code', redirect_uri: redirectUri });
      res = await fetch(p.tokenUrl, { method: 'POST', headers: {'Content-Type':'application/x-www-form-urlencoded'}, body });
    }
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    // Fetch user profile to show who's connected
    const userName = await W.fetchUserName(provider, data.access_token);
    const conn = {
      id: W.uid(), provider, name: userName || p.name,
      config: JSON.stringify({
        provider, accessToken: data.access_token,
        refreshToken: data.refresh_token || '',
        expiresAt: W.now() + (data.expires_in || 3600) * 1000,
        userName: userName || '',
      }),
      lastSyncAt: null, createdAt: W.now()
    };
    await W.dbPut('clouds', conn);
    W.clouds.push(conn);
    W.openModal('cloud');
  } catch (err) {
    alert('OAuth failed: ' + (err.message || err));
  }
};

// ── Refresh expired tokens ──────────────────────────────────
W.ensureFreshToken = async conn => {
  const config = JSON.parse(conn.config);
  if (conn.provider === 's3') return config;
  if (!config.expiresAt || config.expiresAt > W.now() + 300000) return config;
  if (!config.refreshToken) throw new Error('Token expired. Please reconnect.');
  const p = W.PROVIDERS[conn.provider];
  if (!p.clientId) throw new Error('Client ID not configured for ' + p.name);
  let res;
  if (p.needsServerToken) {
    res = await fetch('/api/oauth/token', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ provider: conn.provider, client_id: p.clientId, refresh_token: config.refreshToken }),
    });
  } else {
    const body = new URLSearchParams({ client_id: p.clientId, refresh_token: config.refreshToken, grant_type: 'refresh_token' });
    res = await fetch(p.tokenUrl, { method: 'POST', headers: {'Content-Type':'application/x-www-form-urlencoded'}, body });
  }
  if (!res.ok) throw new Error('Token refresh failed');
  const data = await res.json();
  config.accessToken = data.access_token;
  if (data.refresh_token) config.refreshToken = data.refresh_token;
  config.expiresAt = W.now() + (data.expires_in || 3600) * 1000;
  conn.config = JSON.stringify(config);
  await W.dbPut('clouds', conn);
  return config;
};

      <div style="font-size:10px;color:rgba(5,217,232,.6);margin:12px 0 8px;text-transform:uppercase;letter-spacing:.15em">// connect_new</div>
      <div id="cloud-form" style="display:grid;gap:8px">${oauthBtns}${s3Btn}</div>
    </div></div></div>`;
};
